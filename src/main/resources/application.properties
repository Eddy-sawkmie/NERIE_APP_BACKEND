spring.application.name=nerie

# Server
server.port=8081
server.servlet.context-path=/

# Data source
spring.datasource.url=${DB_URL}
spring.datasource.username=nerie
spring.datasource.password=nerie
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.schemas=nerie
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JPA
# spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=nerie
spring.jpa.properties.hibernate.formal_sql=true
spring.jpa.hibernate.ddl-auto=validate

# Logging
logging.level.org.springframework=ERROR
logging.level.org.springframework.web.servlet.resource=ERROR
logging.level.org.hibernate=ERROR
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.security=ERROR

#Custom Logging
app.interceptor.view-trace.enabled=true

#------------------p6spy logging
# decorator.datasource.p6spy.enable-logging=true
decorator.datasource.p6spy.enable-logging=false

# Optional (nice extras)
# Log only slow queries (example: >500ms)
# decorator.datasource.p6spy.log-slow-sql=true
# decorator.datasource.p6spy.slow-query-threshold=500

#------------------p6spy logging

# logging.level.p6spy=OFF

spring.web.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/META-INF/resources/ 