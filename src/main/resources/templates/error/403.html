<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 - Access Denied</title>

  <style>
    :root {
      --bg-color: #f3f4f6;
      --card-bg: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --accent: #ef4444;
      --btn-bg: #111827;
      --btn-hover: #374151;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--text-main);
    }

    .container {
      background: var(--card-bg);
      padding: 3rem 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
      max-width: 380px;
      width: 90%;
      text-align: center;
    }

    .error-code {
      color: var(--accent);
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      margin: 0 0 0.5rem 0;
      letter-spacing: -0.025em;
    }

    h2 {
      font-size: 1.5rem;
      margin: 0 0 0.75rem 0;
      font-weight: 600;
    }

    p {
      color: var(--text-muted);
      margin: 0 0 2rem 0;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .btn {
      display: inline-block;
      background-color: var(--btn-bg);
      color: #ffffff;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background-color: var(--btn-hover);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

<main class="container">
  <h1 class="error-code">403</h1>
  <h2>Access Denied</h2>
  <p>You don't have the necessary permissions to view this page. Please check your credentials and try again.</p>

  <a th:href="@{/index}" class="btn">Return Home</a>
</main>

</body>
</html>
