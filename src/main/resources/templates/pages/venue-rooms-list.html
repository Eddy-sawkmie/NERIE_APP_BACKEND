<!DOCTYPE html>
<html
        lang="en"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://thymeleaf.org"
        layout:decorate="~{${layoutPath}}"
>
<head>
    <title layout:fragment="title">Venue Rooms</title>

    <div layout:fragment="static-files">
        <script th:inline="javascript">
            const API = {
                saveVenueRoom: [[@{/venue-rooms/save}]],
                redirectErrorURL: [[@{/login}]]
            };
        </script>
        <script th:src="@{/js/venueRoomsList.js}"></script>
    </div>
</head>
<body>
<main layout:fragment="content">
    <div class="container py-5">
        <div class="card border-0 modern-card mb-4">

            <div class="card-header modern-card-header text-white py-4 px-4 border-0 d-flex justify-content-between align-items-center">
                <h4 class="mb-0 fw-bold d-flex align-items-center">
                    <i class="fas fa-door-open me-3 fs-5"></i> Venue Rooms
                </h4>
                <button type="button" class="btn btn-light btn-modern text-primary fw-bold shadow-sm" id="addft" data-bs-toggle="modal" data-bs-target="#modalid-modal">
                    <i class="fas fa-plus me-2"></i> Add New
                </button>
            </div>

            <div class="card-body p-4 p-md-5">
                <div id="message-container" class="mb-3"></div>
                <div class="table-responsive table-wrapper mt-2">
                    <table class="table modern-table align-middle mb-0 w-100" id="roomtable">
                        <thead>
                        <tr>
                            <th style="width: 10%;" class="text-center">Sl No.</th>
                            <th style="width: 35%;">Venue Name</th>
                            <th style="width: 30%;">Room</th>
                            <th style="width: 10%;" class="text-center">Capacity</th>
                            <th style="width: 15%;" class="text-center noExport">Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="v, s : ${mvenueroomList}">
                            <td class="text-center fw-semibold text-muted" th:text="${s.index + 1}"></td>
                            <td><span class="badge bg-light text-dark border d-inline-block px-2 py-1 p-2" th:text="${v.mvenues.venuename}"></span></td>
                            <td><span class="fw-bold text-dark d-block" th:text="${v.roomname}"></span></td>
                            <td class="text-center">
                                <span class="badge bg-success bg-opacity-10 text-success rounded-pill" th:text="${v.capacity}"></span>
                            </td>
                            <td class="text-center white-space-nowrap">
                                <button class="edit-room-btn btn btn-sm btn-primary btn-modern"
                                        data-bs-toggle="modal"
                                        data-bs-target="#modalid-modal"
                                        th:attr="data-roomcode=${v.roomcode},
                                                 data-roomname=${v.roomname},
                                                 data-capacity=${v.capacity},
                                                 data-venuecode=${v.mvenues.venuecode}">
                                    <i class="fas fa-edit me-1"></i> Edit
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalid-modal" tabindex="-1" aria-labelledby="venueRoomModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0 px-4 py-3">
                    <h5 class="modal-title fw-bold text-dark" id="venueRoomModalLabel">
                        <i class="fas fa-door-closed me-2 text-primary"></i> <span id="modal-title-text">Add Venue Room</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body p-4">
                    <form name="mvenueroomfn" id="mvenueroomfid" th:action="@{/venue-rooms/save}" method="POST" role="form" autocomplete="off" novalidate>

                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label for="venuecode" class="form-label-modern">Venue <span class="text-danger">*</span></label>
                                <div class="input-group shadow-sm has-validation" style="border-radius: 0.5rem;">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-building"></i></span>
                                    <select name="venuecode" id="venuecode" class="form-select modern-input border-start-0 ps-2" required>
                                        <option value="">Select Venue</option>
                                        <option th:each="c : ${mvenueList}" th:value="${c.venuecode}" th:text="${c.venuename}"></option>
                                    </select>
                                    <div class="invalid-feedback">Please select a venue.</div>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label for="roomname" class="form-label-modern">Room Name <span class="text-danger">*</span></label>
                                <div class="input-group shadow-sm has-validation" style="border-radius: 0.5rem;">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-sign"></i></span>
                                    <input name="roomcode" id="roomcode" type="hidden"/>
                                    <input name="roomname" id="roomname" class="form-control modern-input border-start-0 ps-2" required maxlength="100" placeholder="e.g., Room 101" />
                                    <div class="invalid-feedback">Room name is required.</div>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label for="capacity" class="form-label-modern">Capacity</label>
                                <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-users"></i></span>
                                    <input name="capacity" id="capacity" class="form-control modern-input border-start-0 ps-2 numbers defaultval" maxlength="5" placeholder="0" />
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-3 mt-4 pt-4 border-top">
                            <button type="button" class="btn btn-light border btn-modern px-4" data-bs-dismiss="modal">
                                <i class="fas fa-times me-2"></i> Cancel
                            </button>
                            <button id="submitRoomForm" type="submit" class="btn btn-primary btn-modern px-5 shadow-sm">
                                <i class="fas fa-save me-2"></i> Submit
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0">
                    <h5 class="modal-title fw-bold text-dark" id="feedbackModalLabel">Message</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-secondary p-4" id="feedbackModalBody">
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" id="modalOkButton" class="btn btn-primary btn-modern px-4" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
