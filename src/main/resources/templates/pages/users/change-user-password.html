<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{${layoutPath}}">
<head>
    <title layout:fragment="title">Change Password</title>
    <th:block layout:fragment="static-files"></th:block>
</head>
<body>
<main layout:fragment="content">
    <div class="container py-5">

        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-10">
                <div class="card border-0 modern-card">

                    <div class="card-header modern-card-header text-white py-4 px-4 border-0">
                        <h4 class="mb-0 fw-bold d-flex align-items-center">
                            <i class="fas fa-key me-3 fs-5"></i> Change Password
                        </h4>
                    </div>

                    <div class="card-body p-4 p-md-5">

                        <div class="alert alert-primary bg-light border-primary border-opacity-25 rounded-3 mb-4 d-flex align-items-center">
                            <i class="fas fa-shield-alt text-primary fs-4 me-3"></i>
                            <div class="small text-secondary">
                                Ensure your new password is at least 8 characters long and includes a mix of numbers, lowercase, and uppercase letters.
                            </div>
                        </div>

                        <form method="POST" th:object="${userlogin}" th:action="@{/users/change-password}" name="userloginfn" id="userloginfid" role="form" autocomplete="off">

                            <div class="mb-4">
                                <label for="userid" class="form-label form-label-modern">User Id <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-user"></i></span>
                                    <input type="text" id="userid" th:value="*{userid}" class="form-control modern-input border-start-0 ps-3" required readonly/>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="olduserpassword" class="form-label form-label-modern">Old Password <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted rounded-end-0"><i class="fas fa-unlock-alt"></i></span>
                                    <input id="olduserpassword" name="olduserpassword" type="password" class="form-control modern-input border-start-0 border-end-0 ps-3 rounded-0" required maxlength="512" placeholder="Enter current password"/>
                                    <span class="input-group-text bg-light border-start-0 text-muted toggle-password rounded-start-0" data-target="olduserpassword" style="cursor: pointer;">
                                        <i class="fas fa-eye"></i>
                                    </span>
                                </div>
                                <small id="oldPasswordError" class="text-danger mt-1 d-block"></small>
                            </div>

                            <div class="mb-4">
                                <label for="userpassword" class="form-label form-label-modern">New Password <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted rounded-end-0"><i class="fas fa-lock"></i></span>
                                    <input name="newuserpassword" id="userpassword" type="password" class="form-control modern-input border-start-0 border-end-0 ps-3 rounded-0" required maxlength="512" placeholder="Create new password"/>
                                    <span class="input-group-text bg-light border-start-0 text-muted toggle-password rounded-start-0" data-target="userpassword" style="cursor: pointer;">
                                        <i class="fas fa-eye"></i>
                                    </span>
                                </div>
                                <small id="newPasswordError" class="text-danger mt-1 d-block"></small>

                                <div class="mt-3">
                                    <div class="strength-progress">
                                        <div class="progress-bar transition-all" id="colorbar" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                                    </div>
                                    <div class="d-flex justify-content-between mt-1">
                                        <small id="percent" class="fw-bold text-muted" style="font-size: 0.75rem;">0%</small>
                                        <small id="results" class="fw-bold text-muted text-uppercase" style="font-size: 0.75rem;">Awaiting Input</small>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-5">
                                <label for="confirmpassword" class="form-label form-label-modern">Confirm Password <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted rounded-end-0"><i class="fas fa-check-double"></i></span>
                                    <input id="confirmpassword" name="confirmpassword" type="password" class="form-control modern-input border-start-0 border-end-0 ps-3 rounded-0" required maxlength="512" placeholder="Verify new password"/>
                                    <span class="input-group-text bg-light border-start-0 text-muted toggle-password rounded-start-0" data-target="confirmpassword" style="cursor: pointer;">
                                        <i class="fas fa-eye"></i>
                                    </span>
                                </div>
                                <small id="confirmPasswordError" class="text-danger mt-1 d-block"></small>
                            </div>

                            <div class="d-flex gap-3 pt-2">
                                <button id="submitBtn" type="submit" name="submit" class="btn btn-primary btn-modern flex-grow-1">
                                    <i class="fas fa-save me-2"></i> Update Password
                                </button>
                                <button id="customResetBtn" type="button" class="btn btn-light border btn-modern">
                                    <i class="fas fa-undo me-1"></i> Reset
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0">
                    <h5 class="modal-title fw-bold text-dark" id="feedbackModalLabel">Message</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-secondary p-4" id="feedbackModalBody">
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" id="modalOkButton" class="btn btn-primary btn-modern px-4" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block layout:fragment="scripts">
    <script th:inline="javascript">
        /*<![CDATA[*/
        const API = {
            checkOldPassword: [[@{/users/check-old-password}]],
            redirectURL: [[@{/users/change-password}]]
        };
        /*]]>*/
    </script>
    <script th:src="@{/js/updateUserPassword.js}"></script>
</th:block>
</body>
</html>
