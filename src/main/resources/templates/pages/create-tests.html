<!DOCTYPE html>
<html
        lang="en"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://www.thymeleaf.org"
        layout:decorate="~{layouts/coordinator-faculty-layout}"
>
<head>
  <title>Tests</title>
  <th:block layout:fragment="static-files"></th:block>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
</div>

<main layout:fragment="content">
  <div class="container py-5">

    <div class="card border-0 modern-card mb-4">
      <div class="card-header modern-card-header text-white py-4 px-4 border-0 d-flex justify-content-between align-items-center">
        <h4 class="mb-0 fw-bold d-flex align-items-center">
          <i class="fas fa-file-signature me-3 fs-5"></i> Add/Edit Test Details
        </h4>
      </div>

      <div class="card-body p-4 p-md-5">
        <form method="POST" th:object="${testdetails}" th:action="@{/tests/saveTestDetails}" name="testform" id="testsdetailsform" role="form" autocomplete="off" novalidate>
          <input type="hidden" th:field="*{testid}" id="testid" />

          <div class="row g-4">

            <div class="col-md-6">
              <label for="subjectcode" class="form-label-modern">Subject <span class="text-danger">*</span></label>
              <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-book"></i></span>
                <select th:field="*{subjectcode.subjectcode}" id="subjectcode" class="form-select modern-input border-start-0 ps-2" required="required">
                  <option value="" th:text="'-- Select Subject --'"></option>
                  <th:block th:each="o : ${subs}">
                    <option th:value="${o[0]}" th:text="${o[0]} + ' - ' + ${o[1]}"></option>
                  </th:block>
                </select>
              </div>
            </div>

            <div class="col-md-6">
              <label for="testno" class="form-label-modern">Test No. <span class="text-danger">*</span></label>
              <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-hashtag"></i></span>
                <input type="text" th:field="*{testno}" id="testno" class="form-control modern-input border-start-0 ps-2 numeric" required="required" maxlength="3" placeholder="e.g., 1" />
              </div>
            </div>

            <div class="col-md-6">
              <label for="testname" class="form-label-modern">Test Name <span class="text-danger">*</span></label>
              <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-heading"></i></span>
                <input type="text" th:field="*{testname}" id="testname" class="form-control modern-input border-start-0 ps-2" required="required" maxlength="200" placeholder="e.g., Mid-Term Examination" />
              </div>
            </div>

            <div class="col-md-6">
              <label for="testdate" class="form-label-modern">Test Date <span class="text-danger">*</span></label>
              <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-calendar-alt"></i></span>
                <input type="text" class="form-control modern-input border-start-0 ps-2 datepicker" id="testdate" th:field="*{testdate}" required="required" placeholder="Select Date"/>
              </div>
            </div>

            <div class="col-md-6">
              <label for="passmark" class="form-label-modern">Pass Mark <span class="text-danger">*</span></label>
              <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-check-circle"></i></span>
                <input type="text" class="form-control modern-input border-start-0 ps-2 numeric" id="passmark" th:field="*{passmark}" required="required" maxlength="3" placeholder="e.g., 40"/>
              </div>
            </div>

            <div class="col-md-6">
              <label for="fullmark" class="form-label-modern">Full Mark <span class="text-danger">*</span></label>
              <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-star"></i></span>
                <input type="text" class="form-control modern-input border-start-0 ps-2 numeric" id="fullmark" th:field="*{fullmark}" required="required" maxlength="3" placeholder="e.g., 100"/>
              </div>
            </div>
          </div>

          <div class="d-flex justify-content-end gap-3 mt-5 pt-4 border-top">
            <button type="button" id="customresetbutton" class="btn btn-light border btn-modern px-4 shadow-sm">
              <i class="fas fa-undo me-2"></i> Reset
            </button>
            <button id="submit" type="submit" name="submit" class="btn btn-primary btn-modern px-5 shadow-sm">
              <i class="fas fa-save me-2"></i> Submit
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="card border-0 modern-card mb-4">
      <div class="card-header bg-white border-bottom py-3 px-4">
        <h5 class="mb-0 fw-bold text-dark"><i class="fas fa-list-ul text-primary me-2"></i> Created Tests</h5>
      </div>
      <div class="card-body p-4 p-md-5">
        <div class="table-responsive table-wrapper">
          <table class="table modern-table align-middle mb-0 w-100" id="usertable">
            <thead>
            <tr>
              <th style="width: 5%;" class="text-center">Sl No.</th>
              <th style="width: 20%;">Test Name</th>
              <th style="width: 10%;" class="text-center">Test No.</th>
              <th style="width: 20%;">Subject</th>
              <th style="width: 15%;">Test Date</th>
              <th style="width: 10%;" class="text-center">Pass Mark</th>
              <th style="width: 10%;" class="text-center">Full Mark</th>
              <th style="width: 10%;" class="text-center noExport">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="v, iterStat : ${testlist}">
              <td class="text-center fw-semibold text-muted" th:text="${iterStat.count}"></td>
              <td><span class="fw-bold text-dark d-block" th:text="${v[3]}"></span></td>
              <td class="text-center" th:text="${v[1]}"></td>
              <td th:text="${v[7]}"></td>
              <td th:text="${v[2] != null ? #dates.format(v[2], 'dd-MM-yyyy') : ''}"></td>
              <td class="text-center" th:text="${v[4]}"></td>
              <td class="text-center" th:text="${v[5]}"></td>
              <td class="text-center text-nowrap">
                <button type="button" class="editbtn btn btn-sm btn-primary btn-modern shadow-sm"
                        th:attr="data-param1=${v[0]},
                                 data-param2=${v[3]},
                                 data-param3=${v[1]},
                                 data-param4=${v[6]},
                                 data-param5=${v[2] != null ? #dates.format(v[2], 'dd-MM-yyyy') : ''},
                                 data-param6=${v[4]},
                                 data-param7=${v[5]}">
                  <i class="fas fa-edit me-1"></i> Edit
                </button>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-light border-0">
          <h5 class="modal-title fw-bold text-dark" id="feedbackModalLabel">Message</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-secondary p-4" id="feedbackModalBody">
        </div>
        <div class="modal-footer border-top-0 pt-0">
          <button type="button" id="modalOkButton" class="btn btn-primary btn-modern px-4" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>
  </div>
</main>

<th:block layout:fragment="scripts">
  <script th:src="@{/js/createTests.js}"></script>
</th:block>
</body>
</html>
