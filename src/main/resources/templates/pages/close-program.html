<!DOCTYPE html>
<html
        lang="en"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://thymeleaf.org"
        layout:decorate="~{${layoutPath}}"
>
<head>
    <title layout:fragment="title">Close Programs</title>
    <div layout:fragment="static-files">

        <script th:inline="javascript">
            const BASE = [[@{/}]];

            function redirect(path) {
                window.location.href = BASE + path;
            }
        </script>
        <script th:src="@{/lily/js/customajax.js}"></script>

        <script th:inline="javascript">
            const API = {
                closePhase: [[@{/program-details/phase/close}]],
                closeProgram: [[@{/program/close}]],
                listProgramOpenCourse: [[@{/program/open-course/list}]],
                listUnclosePhase: [[@{/phases/unclose/list}]]
            };
        </script>
        <script th:src="@{/js/closeProgram.js}"></script>
    </div>
</head>
<body>
<main layout:fragment="content">
    <div class="container py-5">
        <div class="card border-0 modern-card mb-4">
            <div class="card-header modern-card-header text-white py-3 px-4 border-0">
                <h5 class="mb-0 fw-bold d-flex align-items-center">
                    <i class="fas fa-folder-minus me-3 fs-5"></i> List of Un-Closed Programs
                </h5>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <div class="row mb-4 align-items-end">
                    <div class="col-md-5 col-lg-4">
                        <label for="fyunclose" class="form-label-modern">Financial Year <span class="text-danger">*</span></label>
                        <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-calendar-alt"></i></span>
                            <select name="fyunclose" id="fyunclose" class="form-select modern-select border-start-0 ps-2" required>
                                <option value="" disabled selected>-- Select Financial Year --</option>
                                <option th:each="o : ${FYofunclosecourselist}" th:value="${o[0]}" th:text="${o[1]}"></option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div id="tablediv" style="display: none;">
                    <div class="table-responsive table-wrapper">
                        <table class="table modern-table align-middle w-100" id="unclosetable">
                            <thead>
                            <tr>
                                <th style="width: 5%;" class="text-center">#</th>
                                <th style="width: 25%;">Program Name</th>
                                <th style="width: 15%;">Program ID</th>
                                <th style="width: 20%;">Program Description</th>
                                <th style="width: 10%;" class="text-center">No. Of Phases</th>
                                <th style="width: 10%;" class="text-center noExport">View Phases</th>
                                <th style="width: 15%;" class="text-center noExport">Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="phasesModal" tabindex="-1" aria-labelledby="phasesModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0 px-4 py-3">
                    <h5 class="modal-title fw-bold text-dark" id="phasesModalLabel"><i class="fas fa-layer-group text-primary me-2"></i> Program Phases</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="table-responsive table-wrapper">
                        <table class="table modern-table align-middle w-100" id="phasestable">
                            <thead>
                            <tr>
                                <th style="width: 5%;">#</th>
                                <th style="width: 10%;">Phase No</th>
                                <th style="width: 30%;">Phase Description</th>
                                <th style="width: 15%;">Start Date</th>
                                <th style="width: 15%;">End Date</th>
                                <th style="width: 10%;">Close Date</th>
                                <th style="width: 15%;" class="text-center noExport">Action</th>
                            </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-secondary btn-modern px-4" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="phasesModalCloseReport" tabindex="-1" aria-labelledby="phasesReportLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0 px-4 py-3">
                    <h5 class="modal-title fw-bold text-dark" id="phasesReportLabel"><i class="fas fa-file-alt text-warning me-2"></i> Phase Closing Report</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="closephaseform">
                        <input type="hidden" id="phaseid"/>
                        <label for="phaseclosingreport" class="form-label-modern">Brief Closing Report <span class="text-danger">*</span></label>
                        <textarea id="phaseclosingreport" class="form-control modern-input" rows="4" required placeholder="Enter report details here..."></textarea>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0 px-4 pb-4">
                    <button type="button" class="btn btn-light border btn-modern px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-danger btn-modern px-5" form="closephaseform" id="submitClosePhaseBtn"><i class="fas fa-times-circle me-2"></i> Close Phase</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="programModalCloseReport" tabindex="-1" aria-labelledby="programReportLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0 px-4 py-3">
                    <h5 class="modal-title fw-bold text-dark" id="programReportLabel"><i class="fas fa-folder-minus text-danger me-2"></i> Program Closing Report</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="closeprogramform">
                        <input type="hidden" id="programcode"/>
                        <label for="programclosingreport" class="form-label-modern">Brief Closing Report <span class="text-danger">*</span></label>
                        <textarea id="programclosingreport" class="form-control modern-input" rows="4" required placeholder="Enter report details here..."></textarea>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0 px-4 pb-4">
                    <button type="button" class="btn btn-light border btn-modern px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-danger btn-modern px-5" form="closeprogramform" id="submitCloseProgramBtn"><i class="fas fa-times-circle me-2"></i> Close Program</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0">
                    <h5 class="modal-title fw-bold text-dark" id="feedbackModalLabel">Message</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-secondary p-4" id="feedbackModalBody">
                    </div>
                <div class="modal-footer border-top-0 pt-0" id="feedbackModalFooter">
                    </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
