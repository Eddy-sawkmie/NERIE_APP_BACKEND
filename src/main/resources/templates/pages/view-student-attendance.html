<!DOCTYPE html>
<html
        lang="en"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://www.thymeleaf.org"
        layout:decorate="~{layouts/coordinator-faculty-layout}"
>
<head>
    <title>View Student Attendance</title>
    <th:block layout:fragment="static-files"></th:block>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<main layout:fragment="content">

    <div class="container py-5">

        <div class="card border-0 modern-card mb-4">
            <div class="card-header modern-card-header text-white py-4 px-4 border-0 d-flex justify-content-between align-items-center">
                <h4 class="mb-0 fw-bold d-flex align-items-center">
                    <i class="fas fa-search me-3 fs-5"></i> View Student Attendance
                </h4>
            </div>

            <div class="card-body p-4 p-md-5">
                <p class="text-muted mb-4"><i class="fas fa-info-circle me-1 text-primary"></i> Select the filters below to view the attendance records.</p>

                <div class="row g-4">
                    <div class="col-md-6 col-lg-6">
                        <label for="coursecode" class="form-label-modern">Select Course <span class="text-danger">*</span></label>
                        <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-graduation-cap"></i></span>
                            <select id="coursecode" class="form-select modern-input border-start-0 ps-2">
                                <option value="-1">-- Select Course --</option>
                                <th:block th:each="i : ${courselist}">
                                    <option th:value="${i.coursecode}" th:text="${i.coursename}"></option>
                                </th:block>
                            </select>
                        </div>
                    </div>

                    <div class="col-md-6 col-lg-6">
                        <label for="subjectcode" class="form-label-modern">Select Subject <span class="text-danger">*</span></label>
                        <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-book"></i></span>
                            <select id="subjectcode" class="form-select modern-input border-start-0 ps-2">
                                <option value="-1">-- Select Subject --</option>
                            </select>
                        </div>
                    </div>

                    <input id="facultyname" type="hidden" th:value="${deptandfacultyname != null and #lists.size(deptandfacultyname) > 0 and #lists.size(deptandfacultyname[0]) > 0 ? deptandfacultyname[0][0] : ''}" />
                    <input id="departmentname" type="hidden" th:value="${deptandfacultyname != null and #lists.size(deptandfacultyname) > 0 and #lists.size(deptandfacultyname[0]) > 1 ? deptandfacultyname[0][1] : ''}" />
                    <input id="coursename" type="hidden" th:value="${deptandfacultyname != null and #lists.size(deptandfacultyname) > 0 and #lists.size(deptandfacultyname[0]) > 2 ? deptandfacultyname[0][2] : ''}" />

                    <div class="col-md-3">
                        <label for="month" class="form-label-modern">Select Month <span class="text-danger">*</span></label>
                        <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-calendar-alt"></i></span>
                            <select id="month" class="form-select modern-input border-start-0 ps-2">
                                <option value="">-- Select Month --</option>
                                <option value="1">January</option>
                                <option value="2">February</option>
                                <option value="3">March</option>
                                <option value="4">April</option>
                                <option value="5">May</option>
                                <option value="6">June</option>
                                <option value="7">July</option>
                                <option value="8">August</option>
                                <option value="9">September</option>
                                <option value="10">October</option>
                                <option value="11">November</option>
                                <option value="12">December</option>
                            </select>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <label for="year" class="form-label-modern">Year <span class="text-danger">*</span></label>
                        <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-calendar-check"></i></span>
                            <select id="year" class="form-select modern-input border-start-0 ps-2">
                                <option value="">-- Select Year --</option>
                                <th:block th:each="y : ${yearlist}">
                                    <option th:value="${y}" th:text="${y}"></option>
                                </th:block>
                            </select>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <label for="sem" id="semphaselabel" class="form-label-modern">Semester/Phase <span class="text-danger">*</span></label>
                        <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-layer-group"></i></span>
                            <select id="sem" class="form-select modern-input border-start-0 ps-2">
                                <option value="-1">-- Select Sem/Phase --</option>
                            </select>
                        </div>
                    </div>

                    <div class="col-md-3 d-flex align-items-end">
                        <button type="button" class="btn btn-primary btn-modern w-100 shadow-sm py-2" id="viewstudentattendance">
                            <i class="fas fa-search me-2"></i> View Attendance
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 modern-card mb-4">
            <div class="card-header bg-white border-bottom py-3 px-4">
                <h5 class="mb-0 fw-bold text-dark"><i class="fas fa-table text-primary me-2"></i> Attendance Records</h5>
            </div>
            <div class="card-body p-4 p-md-5">
                <div class="table-responsive table-wrapper">
                    <table class="table modern-table align-middle mb-0 w-100" id="attendancetable">
                        <caption style="caption-side:top; font-size: 1.1rem; font-weight: 600; color: #495057; margin-bottom: 1rem;" id="tabcap"></caption>
                        <thead>
                        <tr>
                            <th>Student Attendance</th>
                        </tr>
                        </thead>
                        <tbody id="atttablebody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0">
                    <h5 class="modal-title fw-bold text-dark" id="feedbackModalLabel">Message</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-secondary p-4" id="feedbackModalBody">
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" id="modalOkButton" class="btn btn-primary btn-modern px-4" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

</main>

<th:block layout:fragment="scripts">
    <script th:inline="javascript">
        const API = {
            getStudentAttendance: [[@{/attendance/getStudentAttendance}]],
            getSubjectsByCourseAndFaculty: [[@{/subjects/subjectsByCourseAndFaculty}]]
        };
    </script>
    <script th:src="@{/js/viewStudentAttendance.js}"></script>
</th:block>
</body>
</html>
