<!DOCTYPE html>
<html
        lang="en"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://www.thymeleaf.org"
        layout:decorate="~{layouts/coordinator-faculty-layout}"
>
<head>
  <title>Assignments</title>
  <th:block layout:fragment="static-files"></th:block>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
</div>

<main layout:fragment="content">

  <div class="container py-5">

    <div class="card border-0 modern-card mb-4">
      <div class="card-header modern-card-header text-white py-4 px-4 border-0 d-flex justify-content-between align-items-center">
        <h4 class="mb-0 fw-bold d-flex align-items-center">
          <i class="fas fa-file-invoice me-3 fs-5"></i> New Assignment
        </h4>
      </div>

      <div class="card-body p-4 p-md-5">
        <form th:object="${assignment}" method="POST" th:action="@{/assignments/upload-assignment}" name="assignments" id="assignmentid" enctype="multipart/form-data" role="form" autocomplete="off" novalidate>
          <div class="row g-4">

            <div class="col-sm-12 col-md-6">
              <label for="subjectCodeCreate" class="form-label-modern">Subject <span class="text-danger">*</span></label>
              <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-book"></i></span>
                <select id="subjectCodeCreate" class="form-select modern-input border-start-0 ps-2" th:field="*{subjectcode}" required>
                  <option value="">-- Select Subject --</option>
                  <th:block th:each="d : ${subs}">
                    <option th:value="${d[0]}" th:text="${d[0]} + ' - ' + ${d[1]}"></option>
                  </th:block>
                </select>
              </div>
            </div>

            <div class="col-sm-12 col-md-6">
              <label for="assignmentNameCreate" class="form-label-modern">Assignment Name <span class="text-danger">*</span></label>
              <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-heading"></i></span>
                <input type="text" class="form-control modern-input border-start-0 ps-2" id="assignmentNameCreate" th:field="*{title}" required maxlength="500" placeholder="e.g., Chapter 1 Homework"/>
              </div>
            </div>

            <div class="col-md-8 col-lg-6">
              <label for="AssignmentDescUploadCreate" class="form-label-modern">Assignment Description <span class="text-danger">*</span></label>
              <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                <span class="input-group-text bg-light border-end-0 text-muted align-items-start pt-2"><i class="fas fa-align-left"></i></span>
                <textarea form="assignmentid" id="AssignmentDescUploadCreate" maxlength="500" rows="4" class="form-control modern-input border-start-0 ps-2 py-2" th:field="*{description}" required placeholder="Provide clear instructions..."></textarea>
              </div>
              <b><span id="charactercountdescCreate" class="small text-muted float-end mt-1"></span></b>
            </div>

            <div class="col-lg-6 col-sm-12 col-md-4 mt-auto mb-4">
              <label class="form-label-modern d-block">Select Submission Type <span class="text-danger">*</span></label>
              <div class="d-flex flex-wrap gap-4 mt-2 p-3 bg-light rounded-3 shadow-sm border border-light">
                <div class="form-check form-check-inline m-0">
                  <input class="form-check-input" type="radio" id="noneRadio" name="submissiontype" value="NONE" required />
                  <label class="form-check-label fw-semibold text-secondary" for="noneRadio">None</label>
                </div>
                <div class="form-check form-check-inline m-0">
                  <input class="form-check-input" type="radio" id="fileRadioCreate" value="FILE" th:field="*{submissiontype}" required />
                  <label class="form-check-label fw-semibold text-secondary" for="fileRadioCreate">Upload File</label>
                </div>
                <div class="form-check form-check-inline m-0">
                  <input class="form-check-input" type="radio" id="linkRadioCreate" value="LINK" th:field="*{submissiontype}" />
                  <label class="form-check-label fw-semibold text-secondary" for="linkRadioCreate">Submit Link</label>
                </div>
              </div>
            </div>

            <div class="col-sm-12 col-md-4" id="fileUploadDivCreate" style="display: none;">
              <label for="file1Create" class="form-label-modern">Upload Assignment <span class="text-danger small">(PDF Only)</span></label>
              <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-file-pdf"></i></span>
                <input type="file" accept=".pdf" name="file1" id="file1Create" class="form-control modern-input border-start-0 ps-2 py-2" onchange="assignmentfile('Create')"/>
              </div>
              <span class="mt-2 text-danger small d-block" id="filemessage"></span>
            </div>

            <div class="col-sm-12 col-md-4" id="linkInputDivCreate" style="display: none;">
              <label for="linkInputCreate" class="form-label-modern">Submission Link <span class="text-danger">*</span></label>
              <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-link"></i></span>
                <input type="url" name="submissionLink" id="linkInputCreate" class="form-control modern-input border-start-0 ps-2" placeholder="https://..."/>
              </div>
            </div>

            <div class="col-sm-12 col-md-4">
              <label for="assignmentdateCreate" class="form-label-modern">Schedule Assignment Date <span class="text-danger">*</span></label>
              <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-calendar-alt"></i></span>
                <input class="form-control modern-input border-start-0 ps-2 datepicker" id="assignmentdateCreate" th:field="*{uploaddate}" required placeholder="Select Date"/>
              </div>
              <span class="text-primary small mt-1 d-block"><i class="fas fa-info-circle me-1"></i> When it will be available</span>
            </div>

            <div class="col-sm-12 col-md-4">
              <label for="lastdateCreate" class="form-label-modern">Last Date for Submission <span class="text-danger">*</span></label>
              <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-calendar-times"></i></span>
                <input class="form-control modern-input border-start-0 ps-2 datepicker" id="lastdateCreate" th:field="*{submissiondate}" required placeholder="Select Date"/>
              </div>
            </div>

            <div class="col-sm-12 col-md-4">
              <label for="fullmarkCreate" class="form-label-modern">Full Mark <span class="text-danger">*</span></label>
              <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-star"></i></span>
                <input type="number" min="0" max="100" class="form-control modern-input border-start-0 ps-2" id="fullmarkCreate" th:field="*{fullmark}" required placeholder="e.g., 100"/>
              </div>
            </div>

            <div class="col-sm-12 col-md-4">
              <label for="passmarkCreate" class="form-label-modern">Pass Mark <span class="text-danger">*</span></label>
              <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-check-circle"></i></span>
                <input type="number" min="0" class="form-control modern-input border-start-0 ps-2" id="passmarkCreate" th:field="*{passmark}" required placeholder="e.g., 40"/>
              </div>
            </div>
          </div>

          <div class="d-flex justify-content-end mt-4 pt-4 border-top">
            <button id="subbtnCreate" type="submit" class="btn btn-primary btn-modern px-5 shadow-sm py-2">
              <i class="fas fa-cloud-upload-alt me-2"></i> Upload Assignment
            </button>
          </div>
        </form>

        <div class="mt-5 col-12">
          <div class="card shadow-sm border-0 bg-light rounded-3">
            <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center rounded-3"
                 data-bs-toggle="collapse"
                 data-bs-target="#studentCollapse"
                 style="cursor:pointer;">
              <strong class="text-dark"><i class="fas fa-users me-2 text-primary"></i> Students Assigned</strong>
              <span class="badge bg-primary rounded-pill px-3 py-2" id="studentCountBadge">0</span>
            </div>
            <div id="studentCollapse" class="collapse border-top">
              <div class="card-body p-3">
                <div id="studentListContainer" style="max-height: 210px; overflow-y: auto; overflow-x: hidden;">
                  <div class="text-muted small text-center py-3"><i class="fas fa-info-circle me-1"></i> Select subject to load students</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card border-0 modern-card mb-4">
      <div class="card-header bg-white border-bottom py-3 px-4">
        <h5 class="mb-0 fw-bold text-dark"><i class="fas fa-list-ul text-primary me-2"></i> Assignments List</h5>
      </div>
      <div class="card-body p-4 p-md-5">
        <div class="table-responsive table-wrapper">
          <table class="table modern-table align-middle mb-0 w-100" id="assignmentslist">
            <thead>
            <tr>
              <th style="width: 25%;">Assignment Name</th>
              <th style="width: 20%;">Description</th>
              <th style="width: 15%;" class="text-center">Assigned Date</th>
              <th style="width: 15%;" class="text-center">Last Date</th>
              <th style="width: 10%;" class="text-center noExport">Action</th>
              <th style="width: 15%;" class="text-center noExport">Submissions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="v : ${alist}">
              <td>
                <span class="fw-bold text-dark d-block" th:text="${v.title}"></span>
                <small class="text-primary fw-semibold" th:text="${v.subjectcode.subjectname}"></small>
              </td>
              <td><span class="text-muted text-truncate d-inline-block" style="max-width: 200px;" th:text="${v.description}" title="Hover to read full description" data-bs-toggle="tooltip"></span></td>
              <td class="text-center text-muted" th:text="${#dates.format(v.uploaddate, 'dd-MM-yyyy')}"></td>
              <td class="text-center text-muted fw-semibold" th:text="${#dates.format(v.submissiondate, 'dd-MM-yyyy')}"></td>

              <td class="text-center text-nowrap">
                <div class="d-flex justify-content-center gap-2">

                  <th:block th:if="${v.submissiontype == 'FILE' or (v.submissiontype == null and v.reldoc != null and v.reldoc.length > 0)}">
                    <a th:href="@{/assignments/viewAssignmentDocument(fid=${v.assignmenttestid})}" class="btn btn-sm btn-light btn-modern text-primary shadow-sm border" target="_blank" title="View PDF">
                      <i class="fas fa-eye"></i>
                    </a>
                    <button class="edit-button editbtn-file btn btn-sm btn-primary btn-modern shadow-sm"
                            th:data-id="${v.assignmenttestid}" th:data-title="${v.title}" th:data-description="${v.description}"
                            th:data-subject="${v.subjectcode.subjectcode}" th:data-uploaddate="${#dates.format(v.uploaddate, 'dd-MM-yyyy')}"
                            th:data-submissiondate="${#dates.format(v.submissiondate, 'dd-MM-yyyy')}" th:data-fullmark="${v.fullmark}"
                            th:data-passmark="${v.passmark}" th:data-submissiontype="'FILE'" title="Edit Assignment">
                      <i class="fas fa-edit"></i>
                    </button>
                  </th:block>

                  <th:block th:if="${v.submissiontype == 'LINK'}">
                    <a th:href="${v.reldocAsString}" class="btn btn-sm btn-light btn-modern text-primary shadow-sm border" target="_blank" title="Open Link">
                      <i class="fas fa-external-link-alt"></i>
                    </a>
                    <button class="edit-button editbtn-link btn btn-sm btn-primary btn-modern shadow-sm"
                            th:data-id="${v.assignmenttestid}" th:data-title="${v.title}" th:data-description="${v.description}"
                            th:data-subject="${v.subjectcode.subjectcode}" th:data-uploaddate="${#dates.format(v.uploaddate, 'dd-MM-yyyy')}"
                            th:data-submissiondate="${#dates.format(v.submissiondate, 'dd-MM-yyyy')}" th:data-fullmark="${v.fullmark}"
                            th:data-passmark="${v.passmark}" th:data-submissiontype="'LINK'" th:data-linkurl="${v.reldocAsString}" title="Edit Assignment">
                      <i class="fas fa-edit"></i>
                    </button>
                  </th:block>

                  <th:block th:if="${(v.submissiontype == 'NONE') or (v.submissiontype == null and (v.reldoc == null or v.reldoc.length == 0))}">
                    <button class="edit-button editbtn-none btn btn-sm btn-primary btn-modern shadow-sm w-100"
                            th:data-id="${v.assignmenttestid}" th:data-title="${v.title}" th:data-description="${v.description}"
                            th:data-subject="${v.subjectcode.subjectcode}" th:data-uploaddate="${#dates.format(v.uploaddate, 'dd-MM-yyyy')}"
                            th:data-submissiondate="${#dates.format(v.submissiondate, 'dd-MM-yyyy')}" th:data-fullmark="${v.fullmark}"
                            th:data-passmark="${v.passmark}" th:data-submissiontype="'NONE'">
                      <i class="fas fa-edit me-1"></i> Edit
                    </button>
                  </th:block>

                </div>
              </td>

              <td class="text-center align-middle">
                <span class="text-success fw-bold d-block small mb-1" th:if="${v.submissiontype == 'LINK'}"><i class="fas fa-check-circle me-1"></i> Check Google Forms</span>
                <span class="text-muted fw-bold d-block small mb-1" th:if="${(v.submissiontype == 'NONE') or (v.submissiontype == null and (v.reldoc == null or v.reldoc.length == 0))}"><i class="fas fa-minus-circle me-1"></i> No Submission</span>
                <a class="btn btn-sm btn-info btn-modern shadow-sm text-white w-100" th:if="${v.submissiontype == 'FILE' or (v.submissiontype == null and v.reldoc != null and v.reldoc.length > 0)}" th:href="@{/assignments/view-submitted-assignment(aid=${v.assignmenttestid})}">
                  <i class="fas fa-inbox me-1"></i> Submissions
                </a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>


  <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-light border-0 px-4 py-3">
          <h5 class="modal-title fw-bold text-dark" id="editModalLabel"><i class="fas fa-edit text-primary me-2"></i> Edit Assignment</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-4 p-md-5">
          <form method="POST" name="editassignmentForm" id="editassignmentForm" enctype="multipart/form-data" role="form" autocomplete="off" th:action="@{/assignments/editAssignment}" novalidate>
            <input type="hidden" name="assignmenttestid" id="assignmentIdEdit" />
            <div class="row g-4">

              <div class="col-sm-12 col-md-6">
                <label for="subjectCodeEdit" class="form-label-modern">Subject <span class="text-danger">*</span></label>
                <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-book"></i></span>
                  <select id="subjectCodeEdit" class="form-select modern-input border-start-0 ps-2" name="subjectcode" required>
                    <option value="">-- Select Subject --</option>
                    <th:block th:each="d : ${subs}">
                      <option th:value="${d[0]}" th:text="${d[0]} + ' - ' + ${d[1]}"></option>
                    </th:block>
                  </select>
                </div>
              </div>

              <div class="col-sm-12 col-md-6">
                <label for="edassignmentNameEdit" class="form-label-modern">Assignment Name <span class="text-danger">*</span></label>
                <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-heading"></i></span>
                  <input type="text" class="form-control modern-input border-start-0 ps-2" id="edassignmentNameEdit" name="title" required maxlength="500"/>
                </div>
              </div>

              <div class="col-md-8 col-lg-6">
                <label for="edAssignmentDescUploadEdit" class="form-label-modern">Assignment Description <span class="text-danger">*</span></label>
                <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                  <span class="input-group-text bg-light border-end-0 text-muted align-items-start pt-2"><i class="fas fa-align-left"></i></span>
                  <textarea form="editassignmentForm" id="edAssignmentDescUploadEdit" name="description" maxlength="500" rows="4" class="form-control modern-input border-start-0 ps-2 py-2" required></textarea>
                </div>
                <b><span id="edcharactercountdescEdit" class="small text-muted float-end mt-1"></span></b>
              </div>

              <div class="col-lg-6 col-sm-12 col-md-4 mt-auto mb-4">
                <label class="form-label-modern d-block">Select Submission Type <span class="text-danger">*</span></label>
                <div class="d-flex flex-wrap gap-4 mt-2 p-3 bg-light rounded-3 shadow-sm border border-light">
                  <div class="form-check form-check-inline m-0">
                    <input class="form-check-input" type="radio" id="edNoneRadioEdit" name="submissiontype" value="NONE" required />
                    <label class="form-check-label fw-semibold text-secondary" for="edNoneRadioEdit">None</label>
                  </div>
                  <div class="form-check form-check-inline m-0">
                    <input class="form-check-input" type="radio" id="edfileRadioEdit" value="FILE" name="submissiontype" required />
                    <label class="form-check-label fw-semibold text-secondary" for="edfileRadioEdit">Upload File</label>
                  </div>
                  <div class="form-check form-check-inline m-0">
                    <input class="form-check-input" type="radio" id="edlinkRadioEdit" name="submissiontype" value="LINK" />
                    <label class="form-check-label fw-semibold text-secondary" for="edlinkRadioEdit">Submit Link</label>
                  </div>
                </div>
              </div>

              <div class="col-sm-12 col-md-4" id="edfileInputDivEdit" style="display: none;">
                <label for="edfile1Edit" class="form-label-modern">Upload Assignment <span class="text-danger small">(PDF Only)</span></label>
                <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-file-pdf"></i></span>
                  <input type="file" accept=".pdf" name="file1" id="edfile1Edit" class="form-control modern-input border-start-0 ps-2 py-2" onchange="assignmentfile('Edit')"/>
                </div>
                <span class="mt-2 text-danger small d-block" id="edfilemessage"></span>
              </div>

              <div class="col-sm-12 col-md-4" id="edlinkInputDivEdit" style="display: none;">
                <label for="edlinkInputEdit" class="form-label-modern">Submission Link <span class="text-danger">*</span></label>
                <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-link"></i></span>
                  <input type="url" name="submissionLink" id="edlinkInputEdit" class="form-control modern-input border-start-0 ps-2"/>
                </div>
              </div>

              <div class="col-sm-12 col-md-3">
                <label for="edassignmentdateEdit" class="form-label-modern">Assignment Date <span class="text-danger">*</span></label>
                <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-calendar-alt"></i></span>
                  <input class="form-control modern-input border-start-0 ps-2 datepicker" id="edassignmentdateEdit" name="uploaddate" required/>
                </div>
              </div>

              <div class="col-sm-12 col-md-3">
                <label for="edlastdateEdit" class="form-label-modern">Last Date <span class="text-danger">*</span></label>
                <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-calendar-times"></i></span>
                  <input class="form-control modern-input border-start-0 ps-2 datepicker" id="edlastdateEdit" name="submissiondate" required/>
                </div>
              </div>

              <div class="col-sm-12 col-md-3">
                <label for="edfullmarkEdit" class="form-label-modern">Full Mark <span class="text-danger">*</span></label>
                <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-star"></i></span>
                  <input type="number" min="0" max="100" class="form-control modern-input border-start-0 ps-2" id="edfullmarkEdit" name="fullmark" required/>
                </div>
              </div>

              <div class="col-sm-12 col-md-3">
                <label for="edpassmarkEdit" class="form-label-modern">Pass Mark <span class="text-danger">*</span></label>
                <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                  <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-check-circle"></i></span>
                  <input type="number" min="0" class="form-control modern-input border-start-0 ps-2" id="edpassmarkEdit" name="passmark" required/>
                </div>
              </div>

              <div class="d-flex justify-content-end mt-4 pt-4 border-top">
                <button type="button" class="btn btn-light border btn-modern px-4 shadow-sm me-3" data-bs-dismiss="modal">
                  <i class="fas fa-times me-2"></i> Cancel
                </button>
                <button id="subbtnEdit" type="submit" class="btn btn-primary btn-modern px-5 shadow-sm py-2">
                  <i class="fas fa-save me-2"></i> Update Assignment
                </button>
              </div>

            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-light border-0 px-4 py-3">
          <h5 class="modal-title fw-bold text-dark" id="feedbackModalLabel">Message</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-secondary p-4" id="feedbackModalBody"></div>
        <div class="modal-footer border-top-0 pt-0">
          <button type="button" id="modalOkButton" class="btn btn-primary btn-modern px-4" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>
  </div>
</main>

<th:block layout:fragment="scripts">
  <script th:src="@{/js/uploadAssignment.js}"></script>
</th:block>
</body>
</html>
