<!DOCTYPE html>
<html lang="en" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      xmlns:th="http://thymeleaf.org"
      layout:decorate="~{layouts/principal-director-layout}">
<head>
    <title layout:fragment="title">Manage Notifications</title>

    <div layout:fragment="static-files">
        <style>

            .modern-card-header {
                background: linear-gradient(135deg, #198754 0%, #146c43 100%); /* Green gradient for Principal */
                border-top-left-radius: 1rem !important;
                border-top-right-radius: 1rem !important;
            }

            .status-pill {
                padding: 0.35rem 0.85rem;
                border-radius: 50rem;
                font-size: 0.75rem;
                font-weight: 600;
                display: inline-block;
            }
        </style>

        <script th:inline="javascript">
            const API = {
                uploadNotification: [[@{/notifications/upload}]],
                deleteNotification: [[@{/notifications/delete}]]
            };
        </script>
        <script th:src="@{/js/principalManageNotifications.js}"></script>
    </div>
</head>

<body>
<main layout:fragment="content">
    <div class="container py-5">
        
        <div class="card border-0 modern-card mb-5">
            <div class="card-header modern-card-header text-white py-3 px-4 border-0">
                <h5 class="mb-0 fw-bold d-flex align-items-center">
                    <i class="fas fa-bullhorn me-3 fs-5"></i> Post a Notification
                </h5>
            </div>
            <div class="card-body p-4 p-md-5">
                <form id="notifications_form" autocomplete="off">
                    <div class="row g-4 align-items-start">
                        
                        <div class="col-md-8">
                            <label for="notification" class="form-label-modern">Notification Message <span class="text-danger">*</span></label>
                            <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-comment-dots"></i></span>
                                <textarea name="notification" id="notification" class="form-control modern-input border-start-0 ps-2 pt-4" rows="2" required placeholder="Type your announcement here..."></textarea>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="userType" class="form-label-modern">Target Audience <span class="text-danger">*</span></label>
                            <div class="input-group shadow-sm mb-3" style="border-radius: 0.5rem;">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-users"></i></span>
                                <select name="usertype" id="userType" class="form-select modern-select border-start-0 ps-2" required>
                                    <option class="ps-1" value="-1" disabled selected>-- Select Audience --</option>
                                    <option class="ps-1" value="Faculties">Faculties</option>
                                    <option class="ps-1" value="Students">Students</option>
                                    <option class="ps-1" value="Coordinators">Coordinators</option>
                                    <option class="ps-1" value="All">All Users</option>
                                </select>
                            </div>
                            
                            <button type="button" class="btn btn-success btn-modern w-100 shadow-sm" id="add_notification_btn">
                                <i class="fas fa-paper-plane me-1"></i> Publish Notification
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card border-0 modern-card">
            <div class="card-body p-4 p-md-5">
                <h5 class="fw-bold text-dark mb-4"><i class="fas fa-history text-secondary me-2"></i> Notification History</h5>
                
                <div class="table-responsive table-wrapper">
                    <table class="table modern-table align-middle mb-0 w-100" id="notificationlist">
                        <thead>
                            <tr>
                                <th style="width: 5%;" class="text-center">#</th>
                                <th style="width: 45%;">Notification</th>
                                <th style="width: 15%;">Date</th>
                                <th style="width: 15%;">Audience</th>
                                <th style="width: 20%;" class="text-center noExport">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="v, s : ${allnotifications}">
                                <td class="text-center fw-semibold text-muted" th:text="${s.count}"></td>
                                <td class="text-dark fw-medium" th:text="${v.notification}"></td>
                                <td class="small"><i class="far fa-clock me-1 text-muted"></i> <th:block th:text="${#dates.format(v.entrydate, 'dd-MMM-yyyy')}"></th:block></td>
                                <td>
                                    <span class="status-pill bg-light text-dark border border-secondary border-opacity-25" th:text="${v.receivertype}"></span>
                                </td>
                                <td class="text-center">
                                    <div class="d-flex flex-wrap justify-content-center gap-2">
                                        <button class="btn btn-sm btn-primary btn-modern edit-notification-btn px-3"
                                                th:attr="data-id=${v.notificationid}, data-notification=${v.notification}, data-receivertype=${v.receivertype}"
                                                data-bs-toggle="modal" 
                                                data-bs-target="#editNotificationModal">
                                            <i class="fas fa-edit me-1"></i> Edit
                                        </button>
                                        <button class="btn btn-sm btn-danger btn-modern delete-notification-btn px-3"
                                                th:attr="data-id=${v.notificationid}">
                                            <i class="fas fa-trash-alt me-1"></i> Delete
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editNotificationModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0 px-4 py-3">
                    <h5 class="modal-title fw-bold text-dark" id="editModalLabel"><i class="fas fa-edit text-primary me-2"></i> Edit Notification</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="editNotificationForm">
                        <input type="hidden" id="editNotificationId">
                        <div class="mb-4">
                            <label for="editNotification" class="form-label-modern">Notification Message <span class="text-danger">*</span></label>
                            <textarea class="form-control modern-input" id="editNotification" rows="3" required></textarea>
                        </div>
                        <div class="mb-2">
                            <label for="editUserType" class="form-label-modern">Target Audience <span class="text-danger">*</span></label>
                            <select class="form-select modern-select" id="editUserType" required>
                                <option value="-1" disabled>-- Select Audience --</option>
                                <option value="Faculties">Faculties</option>
                                <option value="Students">Students</option>
                                <option value="Coordinators">Coordinators</option>
                                <option value="All">All Users</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0 px-4 pb-4">
                    <button type="button" class="btn btn-light border btn-modern px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary btn-modern px-5 update-notification-btn"><i class="fas fa-save me-2"></i> Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0">
                    <h5 class="modal-title fw-bold text-dark" id="feedbackModalLabel">Message</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-secondary p-4" id="feedbackModalBody">
                    </div>
                <div class="modal-footer border-top-0 pt-0" id="feedbackModalFooter">
                    </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
