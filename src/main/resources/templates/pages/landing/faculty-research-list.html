<!DOCTYPE html>

<head>
    <title>Faculty List - Under Construction</title>
    <th:block layout:fragment="styles">
        <link th:href="@{/css/facultyResearch.css}" rel="stylesheet">
        
        <style>
            .under-construction-wrapper {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                text-align: center;
                padding: 3rem 1rem;
                font-family: inherit;
            }
            .construction-icon {
                font-size: 5rem;
                margin-bottom: 1rem;
            }
            .construction-title {
                font-size: 2.5rem;
                color: #2c3e50;
                margin-bottom: 1rem;
                font-weight: 700;
            }
            .construction-text {
                font-size: 1.1rem;
                color: #555;
                max-width: 500px;
                margin-bottom: 2rem;
                line-height: 1.6;
            }
            .return-home-btn {
                display: inline-block;
                padding: 0.75rem 1.5rem;
                background-color: #0056b3; /* Adjust this to match your site's primary color */
                color: #ffffff;
                text-decoration: none;
                border-radius: 4px;
                font-weight: 600;
                transition: background-color 0.3s ease;
            }
            .return-home-btn:hover {
                background-color: #004494;
                color: #ffffff;
                text-decoration: none;
            }
        </style>
    </th:block>
</head>
<body>

<div layout:fragment="content">
    <div layout:replace="~{fragments/lilypreloader :: preloader}"></div>

    <div class="under-construction-wrapper">
        <div class="construction-icon">🚧</div>
        <h1 class="construction-title">Page Under Construction</h1>
        <p class="construction-text">
            We are currently gathering and organizing the faculty list. 
            We're working hard to get this page ready, so please check back soon!
        </p>
        <a th:href="@{/}" class="return-home-btn">Return to Homepage</a>
    </div>
