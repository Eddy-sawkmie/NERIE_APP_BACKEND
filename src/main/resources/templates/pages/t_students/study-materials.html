<!DOCTYPE html>
<html
        lang="en"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/student-layout}"
        xmlns:th="http://thymeleaf.org"
>
<div layout:fragment="static-files">

    <script th:inline="javascript">
        const API = {
            getStudyMaterial: [[@{/study-materials/getstudymaterials}]],
            viewStudyMaterial: [[@{/study-materials/viewStudyMaterialDocument}]]
        };
    </script>

    <script th:src="@{/js/studyMaterials.js}"></script>
</div>

<title layout:fragment="title">Study Materials</title>

<main layout:fragment="content">

    <div class="container py-5"> <div class="card border-0 modern-card">

            <div class="card-header modern-card-header text-white py-4 px-4 border-0">
                <h4 class="mb-0 fw-bold d-flex align-items-center">
                    <i class="fas fa-book-reader me-3 fs-5"></i>
                    Study Materials
                </h4>
            </div>

            <div class="card-body p-4 p-md-5">

                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end mb-5 gap-4">
                    
                    <div class="flex-grow-1">
                        <h5 class="fw-bold text-dark mb-2">Resource Library</h5>
                        <p class="text-muted mb-0">
                            Select a subject below to view and download available study materials.
                        </p>
                    </div>

                    <div class="col-12 col-md-5 col-lg-4">
                        <label for="subcode" class="form-label fw-semibold text-secondary small text-uppercase mb-2" style="letter-spacing: 0.5px;">
                            Filter by Subject
                        </label>
                        <select id="subcode" class="form-select modern-select bg-light">
                            <option value="-1">-- Select a Subject --</option>
                            <option th:each="i : ${sublist}"
                                    th:value="${i[1]}"
                                    th:text="${i[0]}">
                            </option>
                        </select>
                    </div>

                </div>

                <div class="table-responsive table-wrapper bg-white">
                    <table class="table modern-table align-middle mb-0" id="assignmentlist" style="width: 100%;">
                        <thead>
                            <tr>
                                <th style="width: 10%;" class="text-center">#</th>
                                <th style="width: 50%;">Material Name</th>
                                <th style="width: 20%;">Upload Date</th>
                                <th style="width: 20%;" class="text-center">Action</th>
                            </tr>
                        </thead>

                        <tbody id="stmattable">
                            </tbody>

                    </table>
                </div>

            </div>
        </div>

    </div>

</main>
</html>
