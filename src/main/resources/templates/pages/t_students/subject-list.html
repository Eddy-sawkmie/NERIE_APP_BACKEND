<!DOCTYPE html>
<html
        lang="en"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/student-layout}"
        xmlns:th="http://thymeleaf.org"
>
<head>
    <title layout:fragment="title">Subjects</title>

    <div layout:fragment="static-files">
        <script th:inline="javascript">
            const API = {
                saveSubjectFeedback: [[@{/feedbacks/postsubjectfeedback}]]
            };
        </script>
        <script type="text/javascript" th:src="@{/js/subjectList.js}"></script>
    </div>
</head>

<body>
<main layout:fragment="content">
    <div class="container py-5">

        <div class="card border-0 modern-card mb-4">

            <div class="card-header modern-card-header text-white py-4 px-4 border-0 d-flex justify-content-between align-items-center">
                <h4 class="mb-0 fw-bold d-flex align-items-center">
                    <i class="fas fa-book me-3 fs-5"></i> Semester Subjects
                </h4>
            </div>

            <div class="card-body p-4 p-md-5">
                <p class="text-muted mb-4 fw-semibold">
                    Subject listing of all subjects for your semester:
                </p>

                <div class="table-responsive table-wrapper mt-2">
                    <table class="table modern-table align-middle mb-0 w-100" id="qsubjecttable">

                        <thead>
                        <tr>
                            <th style="width: 10%;" class="text-center">Sl.no</th>
                            <th style="width: 35%;">Subject</th>
                            <th style="width: 20%;">Faculty</th>
                            <th style="width: 15%;" class="text-center">Subject Type</th>
                            <th style="width: 20%;" class="text-center noExport">Action</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="s, iStat : ${sublist}">
                            <td class="text-center fw-semibold text-muted" th:text="${iStat.count}"></td>
                            <td>
                                <span class="fw-bold text-dark d-block" th:text="${s.sname}"></span>
                            </td>
                            <td>
                                <span class="text-secondary" th:text="${s.fname}"></span>
                            </td>
                            <td class="text-center">
                                    <span class="badge bg-secondary-subtle text-secondary px-3 py-2 rounded-pill shadow-sm"
                                          th:text="${s.stype}">
                                    </span>
                            </td>
                            <td class="text-center white-space-nowrap">
                                <button th:data-scode="${s.subcode}"
                                        th:data-fcode="${s.fcode}"
                                        type="button"
                                        class="btn btn-sm btn-success btn-modern px-3 shadow-sm feedback-btn"
                                        data-bs-toggle="modal"
                                        data-bs-target="#feedbackModal">
                                    <i class="fas fa-comment-dots me-1"></i> Feedback
                                </button>
                            </td>
                        </tr>
                        </tbody>

                    </table>
                </div>
            </div>
        </div>

        <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content border-0 shadow-lg">

                    <div class="modal-header bg-light border-0 px-4 py-3">
                        <h5 class="modal-title fw-bold text-dark" id="feedbackModalLabel">
                            <i class="fas fa-comment-alt me-2 text-primary"></i> Submit Feedback
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>

                    <div class="modal-body p-4">
                        <form id="studentfeedbackform">

                            <input id="feedbacksubjectcode" type="hidden" readonly />
                            <input id="feedbackstudentid" type="hidden" th:value="${studentid}" readonly />
                            <input id="feedbackfacultyid" type="hidden" readonly />

                            <div class="row mb-3">
                                <div class="col-md-12">
                                    <label class="form-label-modern" for="formfeedbackinput">
                                        Your Feedback <span class="text-danger">*</span>
                                    </label>
                                    <div class="shadow-sm" style="border-radius: 0.5rem;">
                                        <textarea placeholder="Enter your feedback here..."
                                                  maxlength="2000"
                                                  id="formfeedbackinput"
                                                  class="form-control border-1 p-3"
                                                  style="border-radius: 0.5rem; border-color: #ced4da; resize: none;"
                                                  rows="5"
                                                  required></textarea>
                                    </div>
                                    <div class="form-text mt-2 text-end text-muted" style="font-size: 0.8rem;">
                                        Maximum 2000 characters
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex justify-content-end gap-3 mt-4 pt-4 border-top">
                                <button type="button" class="btn btn-light border btn-modern px-4" data-bs-dismiss="modal">
                                    <i class="fas fa-times me-2"></i> Cancel
                                </button>
                                <button type="submit" class="btn btn-primary btn-modern px-5 shadow-sm">
                                    <i class="fas fa-paper-plane me-2"></i> Submit Feedback
                                </button>
                            </div>

                        </form>
                    </div>

                </div>
            </div>
        </div>

        <div class="modal fade" id="messageModal" tabindex="-1" aria-labelledby="messageModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow-lg">

                    <div class="modal-header bg-light border-0 px-4 py-3">
                        <h5 class="modal-title fw-bold text-dark" id="messageModalLabel">
                            <i class="fas fa-info-circle me-2 text-primary"></i> Message
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>

                    <div class="modal-body text-secondary p-4 fs-6" id="messageModalBody">
                    </div>

                    <div class="modal-footer border-top-0 pt-0">
                        <button type="button" class="btn btn-primary btn-modern px-4" data-bs-dismiss="modal">OK</button>
                    </div>

                </div>
            </div>
        </div>

    </div>
</main>
</body>
</html>
