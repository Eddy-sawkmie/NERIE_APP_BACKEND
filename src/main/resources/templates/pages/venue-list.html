<!DOCTYPE html>
<html
        lang="en"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://thymeleaf.org"
        layout:decorate="~{${layoutPath}}"
>
<head>
    <title layout:fragment="title">Venues</title>

    <div layout:fragment="static-files">
        <script th:inline="javascript">
            const API = {
                saveVenue: [[@{/venues/save}]]
            };
        </script>
        <script th:src="@{/js/venueList.js}"></script>
    </div>
</head>
<body>
<main layout:fragment="content">
    <div class="container py-5">

        <div class="card border-0 modern-card mb-4">

            <div class="card-header modern-card-header text-white py-4 px-4 border-0 d-flex justify-content-between align-items-center">
                <h4 class="mb-0 fw-bold d-flex align-items-center">
                    <i class="fas fa-list me-3 fs-5"></i> Venues
                </h4>
                <button type="button" class="btn btn-light btn-modern text-primary fw-bold shadow-sm" id="addft" data-bs-toggle="modal" data-bs-target="#venue-modal">
                    <i class="fas fa-plus me-2"></i> Add New
                </button>
            </div>

            <div class="card-body p-4 p-md-5">
                <div class="table-responsive table-wrapper mt-2">
                    <table id="venuetable" class="table modern-table align-middle mb-0 w-100">
                        <thead>
                        <tr>
                            <th style="width: 10%;" class="text-center">Sl No.</th>
                            <th style="width: 70%;">Venue Name</th>
                            <th style="width: 20%;" class="text-center noExport">Action</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="v, s : ${mvenueList}">
                            <td class="text-center fw-semibold text-muted" th:text="${s.index + 1}"></td>
                            <td><span class="fw-bold text-dark d-block" th:text="${v.venuename}"></span></td>
                            <td class="text-center white-space-nowrap">
                                <button class="editvenuebtn btn btn-sm btn-primary btn-modern"
                                        data-bs-toggle="modal"
                                        data-bs-target="#venue-modal"
                                        th:attr="data-param1=${v.venuecode}, data-param2=${v.venuename}">
                                    <i class="fas fa-edit me-1"></i> Edit
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="venue-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0 px-4 py-3">
                    <h5 class="modal-title fw-bold text-dark"><i class="fas fa-building me-2 text-primary"></i> Add/Edit Venue</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body p-4">
                    <form id="mvenuefid" role="form" autocomplete="off">
                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label for="venuename" class="form-label-modern">Venue Name <span class="text-danger">*</span></label>
                                <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-map-marker-alt"></i></span>
                                    <input id="venuecode" name="venuecode" hidden="true"/>
                                    <input id="venuename" name="venuename" class="form-control modern-input border-start-0 ps-2 alphabets" required="true" maxlength="100" placeholder="e.g., Main Auditorium"/>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-3 mt-4 pt-4 border-top">
                            <button type="button" class="btn btn-light border btn-modern px-4" data-bs-dismiss="modal">
                                <i class="fas fa-times me-2"></i> Cancel
                            </button>
                            <button id="submit" type="submit" name="submit" class="btn btn-primary btn-modern px-5 shadow-sm">
                                <i class="fas fa-save me-2"></i> Submit
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0">
                    <h5 class="modal-title fw-bold text-dark" id="feedbackModalLabel">Message</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-secondary p-4" id="feedbackModalBody">
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" id="modalOkButton" class="btn btn-primary btn-modern px-4" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
