<!DOCTYPE html>
<html
        lang="en"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://www.thymeleaf.org"
        layout:decorate="~{layouts/coordinator-faculty-layout}">
<head>
  <title layout:fragment="title">Overall Feedback List</title>
  <div layout:fragment="static-files"></div>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
</div>

<main layout:fragment="content">
  <div class="container py-5">
    <div class="card border-0 modern-card mb-4">

      <div class="card-header modern-card-header text-white py-3 px-4 border-0">
        <div class="d-flex align-items-start">
          <div class="mt-1">
            <i class="fas fa-book me-3 fs-4"></i>
          </div>
          <h5 class="mb-1 fw-bold">Program Feedbacks</h5>
        </div>
      </div>

      <div class="card-body p-4 p-md-5">

        <div class="row mb-4">
          <div class="col-12">
            <div class="mb-3">
              <div class="fs-5 text-dark mb-2" th:text="${program.programcode.programname}"></div>
              <div class="d-flex align-items-start">
                <span class="badge bg-primary bg-opacity-10 text-primary border border-primary-subtle px-2 py-1 me-2 mt-1 fw-medium shadow-none">Phase</span>
                <span class="text-secondary lh-base" th:text="${program.phasedescription}"></span>
              </div>
            </div>
          </div>
        </div>

        <div class="table-responsive table-wrapper mt-2">
          <table class="table modern-table align-middle mb-0 w-100" id="approveprogram">
            <thead>
            <tr>
              <th style="width: 10%;" class="text-center">Sl No.</th>
              <th style="width: 70%;">User</th>
              <th style="width: 20%;" class="text-center noExport">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="v, s : ${feedbackslist}">
              <td class="text-center fw-semibold text-muted" th:text="${s.index + 1}"></td>
              <td><span class="fw-bold text-dark d-block" th:text="${v.mtuserlogin.username}"></span></td>
              <td class="text-center white-space-nowrap">
                <a class="btn btn-sm btn-info btn-modern text-white shadow-sm"
                   th:href="@{/participant/feedback/view-overall-feedback(aid=${v.phaseid.phaseid}, usercode=${v.mtuserlogin.usercode})}">
                  <i class="fas fa-eye me-1"></i> View
                </a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalattendance-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-light border-0 px-4 py-3">
          <h5 class="modal-title fw-bold text-dark"><i class="fas fa-list-alt me-2 text-primary"></i> Attendance Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-4">
          <div class="row p-3 w-100" id="tabledivattendance"></div>
        </div>
        <div class="modal-footer border-top-0 pt-0">
          <button type="button" class="btn btn-light border btn-modern px-4" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>
</main>

<th:block layout:fragment="scripts">
  <script th:src="@{/js/listOverallFeedback.js}"></script>
</th:block>
</body>
</html>
