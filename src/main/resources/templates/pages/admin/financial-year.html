<!DOCTYPE html>
<html lang="en" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      xmlns:th="http://www.thymeleaf.org" 
      layout:decorate="~{__${layoutPath}__}">
<head>
    <title>Manage Financial Year</title>
    <div layout:fragment="static-files">
        <style>
            .modern-card {
                border-radius: 0.75rem;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
                background: #ffffff;
            }
            .modern-card-header {
                background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%);
                border-top-left-radius: 0.75rem !important;
                border-top-right-radius: 0.75rem !important;
                padding: 1rem 1.5rem !important;
            }
            .form-label-modern {
                font-weight: 600;
                color: #6c757d;
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            .btn-modern {
                border-radius: 0.5rem;
                font-weight: 500;
                transition: all 0.2s;
            }
            .table-modern th {
                background-color: #f8f9fa;
                font-weight: 600;
                color: #495057;
                border-bottom-width: 2px;
            }
            .table-modern td {
                vertical-align: middle;
            }
        </style>
    </div>
</head>

<body>
<main layout:fragment="content">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-10">
                
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm border-0" role="alert">
                    <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="card border-0 modern-card mb-4">
                    <div class="card-header modern-card-header text-white border-0">
                        <h5 class="mb-0 fw-bold d-flex align-items-center">
                            <i class="fas fa-calendar-plus me-2"></i> Create Financial Year
                        </h5>
                    </div>
                    
                    <div class="card-body p-3 p-md-4">
                        <form th:action="@{/financial-year/save}" th:object="${newFY}" method="post">
                            <div class="row g-3 align-items-end">
                                
                                <div class="col-md-5">
                                    <label for="fystart" class="form-label-modern mb-1">Start Date <span class="text-danger">*</span></label>
                                    <div class="input-group input-group-sm shadow-sm">
                                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-calendar-alt"></i></span>
                                        <input type="date" id="fystart" th:field="*{fystart}" class="form-control border-start-0 ps-2 py-2" required>
                                    </div>
                                    <small class="text-muted" style="font-size: 0.7rem;">Select April 1st of the starting year.</small>
                                </div>

                                <div class="col-md-5">
                                    <label for="fyend" class="form-label-modern mb-1">End Date <span class="text-danger">*</span></label>
                                    <div class="input-group input-group-sm shadow-sm">
                                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-calendar-check"></i></span>
                                        <input type="date" id="fyend" th:field="*{fyend}" class="form-control border-start-0 ps-2 py-2" required>
                                    </div>
                                    <small class="text-muted" style="font-size: 0.7rem;">Select March 31st of the ending year.</small>
                                </div>

                                <div class="col-md-2 text-md-end mt-3 mt-md-0">
                                    <button type="submit" class="btn btn-primary btn-modern px-4 py-2 shadow-sm w-100">
                                        <i class="fas fa-save me-1"></i> Save
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card border-0 modern-card">
                    <div class="card-header bg-white border-bottom py-3">
                        <h6 class="fw-bold text-dark mb-0"><i class="fas fa-list-ul text-secondary me-2"></i> Existing Financial Years</h6>
                    </div>
                    
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-modern mb-0">
                                <thead>
                                    <tr>
                                        <th class="ps-4">ID</th>
                                        <th>Name</th>
                                        <th>Start Date</th>
                                        <th>End Date</th>
                                        <th>Value Mapping</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="fy : ${fyList}">
                                        <td class="ps-4 fw-medium text-secondary" th:text="${fy[0]}">1</td>
                                        <td>
                                            <span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 rounded-pill px-3 py-1" th:text="${fy[1]}">2021-22</span>
                                        </td>
                                        <td th:text="${#dates.format(fy[2], 'dd MMM yyyy')}">01 Apr 2021</td>
                                        <td th:text="${#dates.format(fy[3], 'dd MMM yyyy')}">31 Mar 2022</td>
                                        <td class="font-monospace text-muted" th:text="${fy[4]}">2021-04##2022-03</td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(fyList)}">
                                        <td colspan="5" class="text-center p-4 text-muted">
                                            <i class="fas fa-box-open fs-3 mb-2 d-block opacity-50"></i>
                                            No financial years found in the system.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>
<th:block layout:fragment="scripts">
    </th:block>
</body>
</html>
