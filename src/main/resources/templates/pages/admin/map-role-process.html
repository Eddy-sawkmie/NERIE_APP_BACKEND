<!DOCTYPE html>
<html
lang="en"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
xmlns:th="http://www.thymeleaf.org"
layout:decorate="~{layouts/admin-layout}"
>
<head>
    <title>Map Processes to Role</title>
    <div layout:fragment="static-files">
        <style>
            .modern-card {
                border-radius: 0.75rem;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
                background: #ffffff;
            }
            
            .modern-card-header {
                background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%);
                border-top-left-radius: 0.75rem !important;
                border-top-right-radius: 0.75rem !important;
                padding: 1rem 1.5rem !important;
            }
            
            .modern-select {
                border-radius: 0.5rem;
                border: 1px solid #dee2e6;
                font-size: 0.95rem;
                cursor: pointer;
            }
            
            .modern-select:focus {
                border-color: #86b7fe;
                box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
            }
            
            .form-label-modern {
                font-weight: 600;
                color: #6c757d;
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            
            .btn-modern {
                border-radius: 0.5rem;
                font-weight: 500;
                transition: all 0.2s;
            }
            
            /* --- Custom Compact Pill Checkboxes --- */
            .process-pill {
                border-radius: 50rem;
                padding: 0.4rem 0.85rem;
                font-size: 0.85rem;
                font-weight: 500;
                border: 1px solid #dee2e6;
                color: #495057;
                background-color: #ffffff;
                cursor: pointer;
                transition: all 0.2s ease;
                display: inline-flex;
                align-items: center;
                user-select: none;
            }
            
            .process-pill:hover {
                background-color: #f1f3f5;
                border-color: #ced4da;
            }
            
            /* Active State */
            .btn-check:checked + .process-pill {
                background-color: rgba(13, 110, 253, 0.1);
                border-color: #0d6efd;
                color: #0d6efd;
                font-weight: 600;
            }
            
            /* Show check icon only when selected */
            .process-pill .check-icon { display: none; }
            .btn-check:checked + .process-pill .check-icon { 
                display: inline-block; 
            }
            
            .checkbox-container {
                transition: opacity 0.3s ease;
                max-height: 55vh; /* Prevents overflow on smaller screens */
                overflow-y: auto;
            }
            
            /* Custom Scrollbar for the container */
            .checkbox-container::-webkit-scrollbar { width: 6px; }
            .checkbox-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
            .checkbox-container::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
            .checkbox-container::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        </style>
    </div>
</head>

<body>
    <main layout:fragment="content">
        <div class="container py-4"> <div class="row justify-content-center">
            <div class="col-12 col-xl-10">
                <div class="card border-0 modern-card mb-4">
                    
                    <div class="card-header modern-card-header text-white border-0">
                        <h5 class="mb-0 fw-bold d-flex align-items-center">
                            <i class="fas fa-sitemap me-2"></i> Role Mapping Configuration
                        </h5>
                    </div>
                    
                    <div class="card-body p-3 p-md-4">
                        
                        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3 pb-3 mb-3 border-bottom">
                            
                            <div class="flex-grow-1" style="max-width: 400px;">
                                <label for="roleSelect" class="form-label-modern mb-1">Target Role <span class="text-danger">*</span></label>
                                <div class="input-group input-group-sm shadow-sm">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-user-tag"></i></span>
                                    <select id="roleSelect" class="form-select modern-select border-start-0 ps-2 py-2">
                                        <option value="">-- Select a Role to map --</option>
                                        <option th:each="r : ${roles}"
                                        th:value="${r.roleId}"
                                        th:text="${r.roleName}">
                                    </option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="d-flex align-items-center gap-3 mt-2 mt-md-0">
                            <span class="badge bg-primary bg-opacity-10 text-primary rounded-pill px-3 py-2 border border-primary border-opacity-25" id="selectedCount">
                                <i class="fas fa-check-circle me-1"></i> 0 Selected
                            </span>
                            <button id="saveMapping" class="btn btn-primary btn-modern px-4 py-2 shadow-sm">
                                <i class="fas fa-save me-1"></i> Save
                            </button>
                        </div>
                        
                    </div>
                    
                    <div>
                        <h6 class="fw-bold text-dark mb-2"><i class="fas fa-list-ul text-secondary me-2"></i>Available Processes</h6>
                        
                        <div class="bg-light p-3 rounded-3 border checkbox-container shadow-inner">
                            <div class="d-flex flex-wrap gap-2">
                                
                                <div th:each="p : ${processes}">
                                    <input class="btn-check processCheck" 
                                    type="checkbox" 
                                    name="processcodes" 
                                    autocomplete="off"
                                    th:value="${p.processcode}" 
                                    th:id="'proc' + ${p.processcode}">
                                    
                                    <label class="process-pill m-0 shadow-sm" th:for="'proc' + ${p.processcode}">
                                        <i class="fas fa-check me-1 check-icon"></i>
                                        <span th:text="${p.processname}"></span>
                                    </label>
                                </div>
                                
                                <div class="w-100 text-center p-4 text-muted" th:if="${#lists.isEmpty(processes)}">
                                    <i class="fas fa-box-open fs-3 mb-2 d-block opacity-50"></i>
                                    No processes available to map.
                                </div>
                                
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-light border-0">
                <h5 class="modal-title fw-bold text-dark" id="feedbackModalLabel">Message</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-secondary p-4" id="feedbackModalBody">
            </div>
            <div class="modal-footer border-top-0 pt-0">
                <button type="button" id="modalOkButton" class="btn btn-primary btn-modern px-4" data-bs-dismiss="modal">OK</button>
            </div>
        </div>
    </div>
</div>
</main>
<th:block layout:fragment="scripts">
<script th:inline="javascript">
    const API = {
        saveRoleProcesses: [[@{/role-processes/save}]],
        getProcessesByRole: [[@{/role-processes/getProcessesByRole}]]
    };
</script>
<script th:src="@{/js/mapRoleProcess.js}"></script>
</th:block>
</body>
</html>
