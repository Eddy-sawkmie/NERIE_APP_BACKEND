<!DOCTYPE html>
<html
        lang="en"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://thymeleaf.org"
        layout:decorate="~{layouts/local-admin-layout}"
>
<head>
    <title layout:fragment="title">Add Alumni Details</title>
    <div layout:fragment="static-files">
        <link th:href="@{/lily/js/select2/select2.min.css}" rel="stylesheet" type="text/css"/>
        <script th:src="@{/lily/js/select2/select2.min.js}" type="text/javascript"></script>

        <link th:href="@{/tempscripts/duallistbox/bootstrap-duallistbox.css}" rel="stylesheet" type="text/css"/>
        <script th:src="@{/tempscripts/duallistbox/jquery.bootstrap-duallistbox.js}" type="text/javascript"></script>

        <link th:href="@{/tempscripts/bootstrap-select/bootstrap-select.min.css}" rel="stylesheet" type="text/css"/>
        <script th:src="@{/tempscripts/bootstrap-select/bootstrap-select.min.js}" type="text/javascript"></script>

        <script th:inline="javascript">
            const API = {
                saveAlumni: [[@{/alumni/save}]],
                listCourseAcademicByDeptCode: [[@{/course-academics/list-by-departmentcode}]],
                generateAcademicYearByDuration: [[@{/course-academics/generateacademicyearbyduration}]],
                checkAlumniExist: [[@{/alumni/check-exist}]],
                getAlumniDetails: [[@{/alumni/detail}]]
            };
        </script>

        <script th:src="@{/js/manageAlumni.js}"></script>
    </div>
</head>
<body>

<main layout:fragment="content">
    <div class="container py-5">
        <div class="card border-0 modern-card mb-4">

            <div class="card-header modern-card-header text-white py-4 px-4 border-0 d-flex justify-content-between align-items-center">
                <h4 class="mb-0 fw-bold d-flex align-items-center">
                    <i class="fas fa-graduation-cap me-3 fs-5"></i> Register Alumni
                </h4>
            </div>

            <div class="card-body p-4 p-md-5">
                <form name="talumniid" id="talumniid" role="form" autocomplete="off" class="bold">
                    <input name="alumniid" id="alumniid" value="" readonly hidden />

                    <div class="row mb-4 align-items-center">
                        <div class="col-md-4">
                            <label for="departmentcode" class="form-label-modern mb-0">Department student belonged to <span class="text-danger">*</span></label>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-building"></i></span>
                                <select name="departmentcode" id="departmentcode" class="form-select modern-input border-start-0 ps-2" required>
                                    <option value="-1" selected disabled>-- Select Department --</option>
                                    <option th:each="d : ${departments}" th:value="${d.departmentcode}" th:text="${d.departmentname}"></option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-4 align-items-center">
                        <div class="col-md-4">
                            <label for="coursecode" class="form-label-modern mb-0">Select Course <span class="text-danger">*</span></label>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-book-open"></i></span>
                                <select name="coursecode" id="coursecode" class="form-select modern-input border-start-0 ps-2" required>
                                    <option value="-1">--Select Course--</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-4 align-items-center">
                        <div class="col-md-4">
                            <label for="batch" class="form-label-modern mb-0">Select Batch: <span class="text-danger">*</span></label>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-calendar-alt"></i></span>
                                <select name="batch" id="batch" class="form-select modern-input border-start-0 ps-2" required>
                                    <option value="-1" selected disabled>Select Course First</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-4 align-items-center">
                        <div class="col-md-4">
                            <label for="rollno" class="form-label-modern mb-0">Roll No: <span class="text-danger">*</span></label>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-id-card"></i></span>
                                <input list="rolllist" name="rollno" id="rollno" placeholder="Roll No" maxlength="11" class="form-control modern-input border-start-0 ps-2" required />
                            </div>
                            <small id="msgRollNo" class="text-danger d-block mt-1"></small>
                            <datalist id="rolllist">
                                <option th:each="r : ${rolllist}" th:value="${r}" th:text="${r}"></option>
                            </datalist>
                        </div>
                    </div>

                    <div class="row mb-4 align-items-center">
                        <div class="col-md-4">
                            <label for="fname" class="form-label-modern mb-0">First Name: <span class="text-danger">*</span></label>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-font"></i></span>
                                <input name="fname" id="fname" type="text" placeholder="First Name" maxlength="30" class="form-control modern-input border-start-0 ps-2 name" required />
                            </div>
                        </div>
                    </div>

                    <div class="row mb-4 align-items-center">
                        <div class="col-md-4">
                            <label for="mname" class="form-label-modern mb-0">Middle Name:</label>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-font"></i></span>
                                <input name="mname" id="mname" type="text" placeholder="Middle Name" maxlength="30" class="form-control modern-input border-start-0 ps-2 name" />
                            </div>
                        </div>
                    </div>

                    <div class="row mb-4 align-items-center">
                        <div class="col-md-4">
                            <label for="lname" class="form-label-modern mb-0">Last Name: <span class="text-danger">*</span></label>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-font"></i></span>
                                <input name="lname" id="lname" type="text" placeholder="Last Name" maxlength="30" class="form-control modern-input border-start-0 ps-2 name" required />
                            </div>
                        </div>
                    </div>

                    <div class="row mb-4 align-items-center">
                        <div class="col-md-4">
                            <label for="gender" class="form-label-modern mb-0">Gender: <span class="text-danger">*</span></label>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-venus-mars"></i></span>
                                <select name="gender" id="gender" class="form-select modern-input border-start-0 ps-2" required>
                                    <option value="" selected disabled>--Select Gender--</option>
                                    <option value="M">Male</option>
                                    <option value="F">Female</option>
                                    <option value="O">Other</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-4 align-items-center">
                        <div class="col-md-4">
                            <label for="email" class="form-label-modern mb-0">Email-Id:</label>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-envelope"></i></span>
                                <input name="email" id="email" type="email" placeholder="Email Address" maxlength="150" class="form-control modern-input border-start-0 ps-2 email" />
                            </div>
                            <small id="msgEmail" class="text-danger d-block mt-1"></small>
                        </div>
                    </div>

                    <div class="row mb-4 align-items-center">
                        <div class="col-md-4">
                            <label for="mobileno" class="form-label-modern mb-0">Mobile No:</label>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-phone-alt"></i></span>
                                <input name="mobileno" id="mobileno" placeholder="Mobile Number" maxlength="10" class="form-control modern-input border-start-0 ps-2 mobile number" />
                            </div>
                            <small id="msgMobile" class="text-danger d-block mt-1"></small>
                        </div>
                    </div>

                    <div class="row mb-5">
                        <div class="col-md-4 pt-2">
                            <label for="currentoccupation" class="form-label-modern mb-0">Current Occupation (If any):</label>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                <span class="input-group-text bg-light border-end-0 text-muted align-items-start pt-2"><i class="fas fa-briefcase"></i></span>
                                <textarea name="currentoccupation" id="currentoccupation" rows="3" placeholder="Job Title / Company" class="form-control modern-input border-start-0 ps-2"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="row mt-4 pt-4 border-top">
                        <div class="col-12 d-flex justify-content-center gap-3">
                            <button type="submit" class="btn btn-primary btn-modern px-5 shadow-sm">
                                <i class="fas fa-save me-2"></i> Submit
                            </button>
                            <button type="reset" class="btn btn-light border btn-modern px-5">
                                <i class="fas fa-undo me-2"></i> Reset
                            </button>
                        </div>
                    </div>
                </form>

                <div class="table-responsive table-wrapper mt-5 pt-3 border-top">
                    <table class="table modern-table align-middle mb-0 w-100" id="usertable">
                        <thead>
                        <tr>
                            <th style="width: 12%;">Roll No.</th>
                            <th style="width: 10%;">Batch</th>
                            <th style="width: 20%;">Alumni Name</th>
                            <th style="width: 20%;">Department</th>
                            <th style="width: 15%;">Email-Id & Phone</th>
                            <th style="width: 13%;">Occupation</th>
                            <th class="noExport text-center" style="width: 10%; min-width: 100px;">Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="a, s : ${alumnilist}">
                            <td class="fw-semibold text-muted" th:text="${a[1]}"></td>
                            <td th:text="${a[3]}"></td>
                            <td><span class="fw-bold text-dark d-block" th:text="${a[2]}"></span></td>
                            <td th:text="${a[7]}"></td>
                            <td class="text-muted small" th:text="${a[5]} + ' ' + ${a[4]}"></td>
                            <td class="text-muted" th:text="${a[6]}"></td>
                            <td class="text-center white-space-nowrap">
                                <button type="button" class="btn btn-primary btn-sm btn-modern editalum w-100" th:attr="data-id=${a[0]}">
                                    <i class="fas fa-edit me-1"></i> Edit
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0 px-4 py-3">
                    <h5 class="modal-title fw-bold text-dark" id="feedbackModalLabel"><i class="fas fa-info-circle me-2 text-primary"></i> Message</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-secondary p-4" id="feedbackModalBody">
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" id="modalOkButton" class="btn btn-primary btn-modern px-4" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
