<!DOCTYPE html>
<html
        lang="en"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://www.thymeleaf.org"
        layout:decorate="~{${layoutPath}}"
>
<head>
    <title>Attendance Report of Participant and Resource</title>
    <div layout:fragment="static-files">
        <link th:href="@{/css/reports.css}" type="text/css" rel="stylesheet" />
    </div>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<main layout:fragment="content">
    <div class="container py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10 col-xl-9">

                <div class="card sleek-card">
                    <div class="card-body p-4 p-md-5">

                        <div class="text-center mb-5">
                            <div class="d-inline-flex align-items-center justify-content-center bg-opacity-10 text-primary rounded-circle mb-3" style="width: 60px; height: 60px;">
                                <i class="fas fa-calendar-check fs-4"></i>
                            </div>
                            <h4 class="sleek-title">Attendance Reports</h4>
                            <p class="text-muted small">Generate participant and resource person attendance records.</p>
                        </div>

                        <form method="POST" th:object="${rep_att}" name="rep_attnm" id="rep_attid" role="form" autocomplete="off">

                            <div class="row g-4 mb-4">
                                <div class="col-md-6">
                                    <label for="reporttype" class="sleek-label">Report Type <span class="text-danger">*</span></label>
                                    <div class="sleek-input-group">
                                        <div class="sleek-icon"><i class="fas fa-clipboard-list"></i></div>
                                        <select name="reporttype" id="reporttype" class="form-select sleek-select ps-2" required="true">
                                            <option value="-1" th:text="'Select'">Select</option>
                                            <option value="1" th:text="'Participant'"></option>
                                            <option value="2" th:text="'Resource Person'"></option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label for="finyear" class="sleek-label">Financial Year <span class="text-danger">*</span></label>
                                    <div class="sleek-input-group">
                                        <div class="sleek-icon"><i class="far fa-calendar-check"></i></div>
                                        <select name="finyear" id="finyear" class="form-select sleek-select ps-2" required="true">
                                            <option value="" th:text="'Select'"></option>
                                            <th:block th:each="o : ${fylist}">
                                                <option th:value="${o[0]}" th:text="${o[1]}"></option>
                                            </th:block>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label for="programs" class="sleek-label">Program <span class="text-danger">*</span></label>
                                    <div class="sleek-input-group">
                                        <div class="sleek-icon"><i class="fas fa-chalkboard-teacher"></i></div>
                                        <select name="programs" id="programs" class="form-select sleek-select ps-2" required="true">
                                            <option value="-1" th:text="'Select'"></option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label for="phaseid" class="sleek-label">Phase No. <span class="text-danger">*</span></label>
                                    <div class="sleek-input-group">
                                        <div class="sleek-icon"><i class="fas fa-layer-group"></i></div>
                                        <select id="phaseid" class="form-select sleek-select ps-2" required="true">
                                            <option value="">Select</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 mt-5 flex-wrap">
                                <button type="button" id="view_aggregateid" name="view_aggregate" class="btn btn-sleek btn-sleek-primary">
                                    <i class="fas fa-chart-pie me-2"></i> Aggregate
                                </button>
                                <button type="button" id="view_detailsid" name="view_details" class="btn btn-sleek btn-sleek-primary">
                                    <i class="fas fa-list-ul me-2"></i> Detailed
                                </button>
                                <button type="button" id="view_rpid" name="view_rp" class="btn btn-sleek btn-sleek-light">
                                    <i class="fas fa-eye me-2"></i> View RP
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block layout:fragment="scripts">
    <script th:inline="javascript">
        const API = {
            getFYCourseList: [[@{/student-leaves/getFYCourseList}]],
            getPhasesBasedOnProgram: [[@{/phases/getPhasesBasedOnProgram}]],
            printReportAttendance: [[@{/reports/ReportAttendance}]]
        };
    </script>
    <script th:src="@{/js/reportAttendanceList.js}"></script>
</th:block>
</body>
</html>
