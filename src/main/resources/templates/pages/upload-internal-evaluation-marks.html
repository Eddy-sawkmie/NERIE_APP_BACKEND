<!DOCTYPE html>
<html
        lang="en"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://www.thymeleaf.org"
        layout:decorate="~{layouts/coordinator-faculty-layout}"
>
<head>
  <title>Internal Evaluation</title>
  <th:block layout:fragment="static-files"></th:block>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
</div>

<main layout:fragment="content">
  <div class="container py-5">

    <div class="card border-0 modern-card mb-4">
      <div class="card-header modern-card-header text-white py-4 px-4 border-0 d-flex justify-content-between align-items-center">
        <h4 class="mb-0 fw-bold d-flex align-items-center">
          <i class="fas fa-clipboard-check me-3 fs-5"></i> Internal Evaluation Form
        </h4>
      </div>

      <div class="card-body p-4 p-md-5">

        <div class="alert alert-info border-0 shadow-sm rounded-3 text-center py-3 px-4 mb-4">
          <h6 class="mb-0 fw-semibold text-dark">
            <i class="fas fa-info-circle me-2 text-primary"></i>
            Internal evaluation marks is the <strong class="text-danger">final marks</strong>. Faculty must <strong>assess</strong> and <strong class="text-primary">calculate total marks</strong> for each subject/student before submission.
          </h6>
        </div>

        <div class="row g-4">
          <div class="col-md-5">
            <label for="subjectcode" class="form-label-modern">Select Subject <span class="text-danger">*</span></label>
            <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-book"></i></span>
              <select id="subjectcode" class="form-select modern-input border-start-0 ps-2">
                <option value="-1">-- Select Subject --</option>
                <option th:if="${subs != null}" th:each="s : ${subs}" th:value="${s[0]}" th:text="${s[0]} + ' - ' + ${s[1]}"></option>
              </select>
            </div>
          </div>

          <div class="col-md-5">
            <label for="testid" class="form-label-modern">Select Test <span class="text-danger">*</span></label>
            <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-file-alt"></i></span>
              <select id="testid" class="form-select modern-input border-start-0 ps-2" disabled>
                <option value="-1">-- Select Subject First --</option>
              </select>
            </div>
          </div>

          <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-primary btn-modern w-100 shadow-sm py-2 loadstudentsbtn" data-function="loadStudents">
              <i class="fas fa-sync-alt me-2"></i> Load
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="card border-0 modern-card mb-4">
      <div class="card-header bg-white border-bottom py-3 px-4 d-flex justify-content-between align-items-center">
        <h5 class="mb-0 fw-bold text-dark" id="tabletitle"><i class="fas fa-list-ol text-primary me-2"></i> Internal Evaluation</h5>
        <h5 class="mb-0 fw-bold text-success" id="fullmark"></h5>
      </div>

      <div class="card-body p-4 p-md-5">
        <form id="marksform" autocomplete="off">
          <div class="table-responsive table-wrapper">
            <table class="table modern-table align-middle mb-0 w-100" id="internalevaluationtable">
              <thead>
              <tr>
                <th style="width: 20%;" class="text-center">Student ID</th>
                <th style="width: 60%;">Student Name</th>
                <th style="width: 20%;" class="text-center">Assign Marks</th>
              </tr>
              </thead>
              <tbody id="studentslist">
              </tbody>
            </table>
          </div>

          <div class="d-flex justify-content-end mt-4 pt-4 border-top">
            <button type="submit" class="btn btn-success btn-modern px-5 shadow-sm">
              <i class="fas fa-save me-2"></i> Save Student Marks
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-light border-0">
          <h5 class="modal-title fw-bold text-dark" id="feedbackModalLabel">Message</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-secondary p-4" id="feedbackModalBody">
        </div>
        <div class="modal-footer border-top-0 pt-0">
          <button type="button" id="modalOkButton" class="btn btn-primary btn-modern px-4" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>
  </div>
</main>

<th:block layout:fragment="scripts">
  <script th:inline="javascript">
    const API = {
        getInternalEvaluationBySubject: [[@{/internal-evaluation-marks/by-subject}]],
        saveInternalEvaluation: [[@{/internal-evaluation-marks/saveInternalEvaluation}]],
        getStudentsList: [[@{/students/getStudentsList}]]
    };
  </script>
  <script th:src="@{/js/uploadInternalEvaluationMarks.js}"></script>
</th:block>
</body>
</html>
