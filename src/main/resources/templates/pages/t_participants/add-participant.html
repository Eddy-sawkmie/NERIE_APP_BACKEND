<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://thymeleaf.org"
      layout:decorate="~{${layoutPath}}">
<head>
    <title layout:fragment="title">Add Participants</title>

    <div layout:fragment="static-files">
        <script th:inline="javascript">
            const BASE = [[@{/}]];

            function redirect(path) {
                window.location.href = BASE + path;
            }
        </script>
        <script th:src="@{/lily/js/customajax.js}"></script>

        <script th:inline="javascript">
            const API = {
                listFinancialYear: [[@{/program/financial-year/list}]],
                listPhases: [[@{/phases/list}]],
                getParticipant: [[@{/participant/get-participant}]],
                createParticipant: [[@{/participant/create}]],
                listParticipant: [[@{/participant/list}]],
                getParticipantDetails: [[@{/program/participant-details}]],
                removeParticipant: [[@{/participant/remove}]],
                acceptOrRejectCourseParticipant: [[@{/program/accept-reject-course-participant}]],
                participantListDetails: [[@{/program/program-participant-list-details}]]
            };
        </script>
        <script th:src="@{/js/addParticipant.js}"></script>

        <style>
            /* Default for mobile: almost full width */
            .custom-modal-width {
                max-width: 100%;
            }

            /* For tablets and desktops (screens larger than 768px) */
            @media (min-width: 768px) {
                .custom-modal-width {
                    max-width: 70%;
                }
            }
        </style>
    </div>
</head>
<body>

<main layout:fragment="content">
    <div class="container py-5">
        <div class="card border-0 modern-card mb-4">

            <div class="card-header modern-card-header text-white py-4 px-4 border-0 d-flex justify-content-between align-items-center">
                <h4 class="mb-0 fw-bold d-flex align-items-center">
                    <i class="fas fa-users me-3 fs-5"></i> Add Participants
                </h4>
            </div>

            <div class="card-body p-4 p-md-5">

                <h5 class="fw-bold mb-4 border-bottom pb-2 text-dark"><i class="fas fa-cogs me-2 text-primary"></i> Program Details</h5>

                <div class="row gx-4 gy-4 mb-5">
                    <div class="col-md-6 col-lg-4">
                        <label for="financialyear" class="form-label-modern d-block mb-2">
                            Financial Year: <span class="text-danger">*</span>
                        </label>
                        <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                            <span class="input-group-text bg-light border-end-0 text-muted d-flex align-items-center">
                                <i class="fas fa-calendar-alt"></i>
                            </span>
                            <select name="financialyear" id="financialyear" class="form-select modern-input border-start-0 ps-2" required="true">
                                <option value="" selected>Select</option>
                                <option th:each="o : ${fylist}" th:value="${o[4]}" th:text="${o[1]}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="col-md-6 col-lg-4">
                        <label for="programs" class="form-label-modern d-block mb-2">
                            Program Name: <span class="text-danger">*</span>
                        </label>
                        <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                            <span class="input-group-text bg-light border-end-0 text-muted d-flex align-items-center">
                                <i class="fas fa-project-diagram"></i>
                            </span>
                            <select name="programcode" id="programs" class="form-select modern-input border-start-0 ps-2 select2-search" required="true">
                                <option value="">Select</option>
                            </select>
                        </div>
                    </div>

                    <div class="col-md-6 col-lg-4">
                        <label for="phaseno" class="form-label-modern d-block mb-2">
                            Phase No:
                        </label>
                        <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                            <span class="input-group-text bg-light border-end-0 text-muted d-flex align-items-center">
                                <i class="fas fa-layer-group"></i>
                            </span>
                            <select id="phaseno" name="phaseid" class="form-select modern-input border-start-0 ps-2" required="true">
                                <option value="">Select</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="uploadbtn">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2 mt-2">
                        <h5 class="fw-bold mb-0 text-dark"><i class="fas fa-list-ul me-2 text-primary"></i> Participant List</h5>
                        <button type="button" class="btn btn-primary btn-modern shadow-sm px-4" id="addft" name="addft" data-bs-toggle="modal" data-bs-target="#modalsubj-modal">
                            <i class="fas fa-user-plus me-2"></i> Add New
                        </button>
                    </div>

                    <div class="table-responsive table-wrapper mt-4 d-none" id="tablediv">
                        <table class="table modern-table align-middle mb-0 w-100" id="addparticipanttable">
                            <thead>
                            <tr>
                                <th class="text-center" style="width: 5%;">Sl. No.</th>
                                <th>Application Code</th>
                                <th>User Id</th>
                                <th>Participant Name</th>
                                <th>Mobile No.</th>
                                <th>State</th>
                                <th>Status</th>
                                <th class="text-center" style="min-width: 120px; width: 120px;">Action</th>
                            </tr>
                            </thead>
                        </table>
                        <div id="compiled-div" class="text-center mt-3"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalsubj-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered custom-modal-width">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0 px-4 py-3">
                    <h5 class="modal-title fw-bold text-dark"><i class="fas fa-user-plus me-2 text-primary"></i> Add Participant Form</h5>
                    <button type="button" class="btn-close resetformbtn" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body p-4 p-md-5">
                    <form name="mtuserloginfn" id="mtuserloginfid" autocomplete="off" role="form">
                        <input name="phaseid" id="phaseid" class="form-control" readonly hidden/>
                        <input name="usercode" id="usercode" class="form-control" readonly hidden/>

                        <div class="row gx-4 gy-4">
                            <div class="col-md-6">
                                <label for="emailid" class="form-label-modern d-block mb-2">Email Id: <span class="text-danger">*</span></label>
                                <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                    <span class="input-group-text bg-light border-end-0 text-muted d-flex align-items-center">
                                        <i class="fas fa-envelope"></i>
                                    </span>
                                    <input name="emailid" id="emailid" type="email" class="form-control modern-input border-start-0 ps-2" required maxlength="50" placeholder="participant@example.com"/>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="username" class="form-label-modern d-block mb-2">Participant Name: <span class="text-danger">*</span></label>
                                <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                    <span class="input-group-text bg-light border-end-0 text-muted d-flex align-items-center">
                                        <i class="fas fa-user"></i>
                                    </span>
                                    <input name="username" id="username" class="form-control modern-input border-start-0 ps-2 alphabets" required="true" placeholder="Full Name" />
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="usermobile" class="form-label-modern d-block mb-2">Mobile No.: <span class="text-danger">*</span></label>
                                <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                    <span class="input-group-text bg-light border-end-0 text-muted d-flex align-items-center">
                                        <i class="fas fa-mobile-alt"></i>
                                    </span>
                                    <input name="usermobile" id="usermobile" class="form-control modern-input border-start-0 ps-2 numbers" required="true" maxlength="10" placeholder="10-digit number"/>
                                </div>
                                <div id="msg1" class="text-danger mt-1 small w-100"></div>
                            </div>

                            <div class="col-md-6">
                                <label for="statecode" class="form-label-modern d-block mb-2">State of the Office: <span class="text-danger">*</span></label>
                                <div class="input-group shadow-sm" style="border-radius: 0.5rem;">
                                    <span class="input-group-text bg-light border-end-0 text-muted d-flex align-items-center">
                                        <i class="fas fa-map-marker-alt"></i>
                                    </span>
                                    <select name="statecode" id="statecode" class="form-select modern-input border-start-0 ps-2" required="true">
                                        <option value="">Select</option>
                                        <option th:each="o: ${mstatelist}" th:value="${o.statecode}" th:text="${o.statename}"></option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-3 mt-5 pt-4 border-top">
                            <button type="button" class="btn btn-light border btn-modern px-4 resetformbtn" data-bs-dismiss="modal">
                                <i class="fas fa-times me-2"></i> Cancel
                            </button>
                            <button id="submit" type="submit" name="submit" class="btn btn-success btn-modern px-5 shadow-sm">
                                <i class="fas fa-save me-2"></i> Submit
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmationModal" tabindex="-1" aria-labelledby="confirmationModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0 px-4 py-3">
                    <h5 class="modal-title fw-bold text-dark" id="confirmationModalLabel"><i class="fas fa-exclamation-triangle me-2 text-warning"></i> Confirm Action</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-secondary p-4" id="confirmationModalBody">
                </div>
                <div class="modal-footer border-top-0 pt-0 px-4 pb-4">
                    <button type="button" class="btn btn-light border btn-modern px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="confirmActionButton" class="btn btn-primary btn-modern px-4 shadow-sm">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-0 px-4 py-3">
                    <h5 class="modal-title fw-bold text-dark" id="feedbackModalLabel"><i class="fas fa-info-circle me-2 text-primary"></i> Message</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-secondary p-4" id="feedbackModalBody">
                </div>
                <div class="modal-footer border-top-0 pt-0 px-4 pb-4">
                    <button type="button" id="modalOkButton" class="btn btn-primary btn-modern px-4" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

</main>
</body>
</html>
