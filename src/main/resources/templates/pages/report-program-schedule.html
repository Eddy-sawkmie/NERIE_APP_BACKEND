<!DOCTYPE html>
<html
        lang="en"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://www.thymeleaf.org"
        layout:decorate="~{${layoutPath}}"
>
<head>
    <title>Program Schedule Report</title>
    <div layout:fragment="static-files">
        <link th:href="@{/css/reports.css}" type="text/css" rel="stylesheet" />
    </div>
</head>
<body>

<main layout:fragment="content">
    <div class="container py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-9 col-xl-8">
                
                <div class="card sleek-card">
                    <div class="card-body p-4 p-md-5">
                        
                        <div class="text-center mb-4">
                            <div class="d-inline-flex align-items-center justify-content-center bg-opacity-10 text-primary rounded-circle mb-3" style="width: 60px; height: 60px;">
                                <i class="fas fa-calendar-alt fs-4"></i>
                            </div>
                            <h4 class="sleek-title">Program Schedule Report</h4>
                            <p class="text-muted small">Download the complete timetable schedule for a specific program phase.</p>
                        </div>

                        <div class="alert alert-info border-0 bg-warning bg-opacity-10 text-center py-3 px-4 mb-5 rounded-3">
                            <i class="fas fa-info-circle text-danger me-2"></i>
                            <span class="small fw-medium text-dark">
                                Note: Program schedule needs to be created first for the report to be generated.
                            </span>
                        </div>

                        <form method="POST" th:object="${t_programttrep}" name="programttrep" id="tprogramttrepform" role="form" autocomplete="off">
                            
                            <div class="row g-4 mb-4">
                                <div class="col-md-6">
                                    <label for="finyear" class="sleek-label">Financial Year <span class="text-danger">*</span></label>
                                    <div class="sleek-input-group">
                                        <div class="sleek-icon"><i class="far fa-calendar-check"></i></div>
                                        <select name="finyear" id="finyear" class="form-select sleek-select ps-2" required>
                                            <option value="" disabled selected>-- Select FY --</option>
                                            <th:block th:each="o : ${fylist}">
                                                <option th:value="${o[0]}" th:text="${o[1]}"></option>
                                            </th:block>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label for="programs" class="sleek-label">Target Program <span class="text-danger">*</span></label>
                                    <div class="sleek-input-group">
                                        <div class="sleek-icon"><i class="fas fa-chalkboard-teacher"></i></div>
                                        <select name="programs" id="programs" class="form-select sleek-select ps-2" required>
                                            <option value="-1" disabled selected>-- Select a Program --</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-md-12">
                                    <label for="phaseid" class="sleek-label">Phase No. <span class="text-danger">*</span></label>
                                    <div class="sleek-input-group">
                                        <div class="sleek-icon"><i class="fas fa-layer-group"></i></div>
                                        <select id="phaseid" class="form-select sleek-select ps-2" required>
                                            <option value="" disabled selected>-- Select Phase --</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 mt-5">
                                <button type="reset" class="btn btn-sleek btn-sleek-light"><i class="fas fa-undo me-2"></i> Reset Form</button>
                                <button type="button" id="submitBtn" class="btn btn-sleek btn-sleek-primary submitbtn">
                                    <i class="fas fa-cloud-download-alt me-2"></i> Generate Report
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 1rem;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-dark w-100 text-center mt-2" id="feedbackModalLabel">Message</h5>
                </div>
                <div class="modal-body text-secondary text-center px-4 py-3" id="feedbackModalBody">
                    </div>
                <div class="modal-footer border-0 pt-0 justify-content-center pb-4" id="feedbackModalFooter">
                    </div>
            </div>
        </div>
    </div>

</main>

<th:block layout:fragment="scripts">
    <script th:inline="javascript">
        const API = {
            getFYCourseList: [[@{/student-leaves/getFYCourseList}]],
            getPhasesBasedOnProgram: [[@{/phases/getPhasesBasedOnProgram}]],
            printScheduleReport: [[@{/reports/scheduleReport}]]
        };
    </script>
    <script th:src="@{/js/reportProgramSchedule.js}"></script>
</th:block>
</body>
</html>
