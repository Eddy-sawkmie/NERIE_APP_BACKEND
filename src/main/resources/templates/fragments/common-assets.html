<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="common-scripts">
    <script th:src="@{/lily/js/jquery-3.6.0.min.js}"></script>
    <script src="https://code.jquery.com/jquery-migrate-3.5.2.js"></script>
    <link rel="icon" th:href="@{/tempscripts/images/India.gif}" type="image/x-icon">

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>

    <!--Bootstrap 5-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery UI -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

    <!-- DATATABLES CORE & RESPONSIVE -->
    <link href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/responsive/3.0.2/css/responsive.bootstrap5.min.css" rel="stylesheet">

    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/3.0.2/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/3.0.2/js/responsive.bootstrap5.min.js"></script>

    <!-- JSZip is required for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Buttons CSS/JS -->
    <link href="https://cdn.datatables.net/buttons/3.0.2/css/buttons.bootstrap5.min.css" rel="stylesheet">
    <script src="https://cdn.datatables.net/buttons/3.0.2/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/3.0.2/js/buttons.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/3.0.2/js/buttons.html5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/3.0.2/js/buttons.print.min.js"></script>

    <!-- CUSTOM & VENDOR STYLES -->
    <link rel="stylesheet" th:href="@{/tempscripts/css/base-responsive.css}" />
    <link rel="stylesheet" th:href="@{/tempscripts/css/animate.min.css}" />
    <link rel="stylesheet" th:href="@{/tempscripts/css/font-awesome.min.css}" />
    <link th:href="@{/tempscripts/vendor/fontawesome-free/css/all.min.css}" rel="stylesheet" type="text/css">

    <!-- OTHER VENDOR SCRIPTS -->
    <script th:src="@{/tempscripts/vendor/jquery/jquery-confirm.min.js}" type="text/javascript"></script>
    <link th:href="@{/tempscripts/vendor/jquery/jquery-confirm.min.css}" rel="stylesheet" type="text/css"/>

    <script th:src="@{/lily/js/notiflix/notiflix.js}"></script>
    <link th:href="@{/lily/js/notiflix/notiflix.css}" type="text/css" rel="stylesheet" />

    <script th:src="@{/tempscripts/vendor/charts/Chart.min.js}"></script>

    <link rel="stylesheet" th:href="@{/lily/js/select2/select2.min.css}" />
    <script th:src="@{/lily/js/select2/select2.min.js}"></script>

    <script th:src="@{/lily/js/utility.js}"></script>
    <script th:src="@{/lily/js/customajax.js}"></script>

    <script th:inline="javascript">
        const BASE = [[@{/}]];
        var redirectLoginURL = [[@{/login}]];
        function redirect(path) { window.location.href = BASE + path; }
    </script>
    <script th:src="@{/js/utils/networkUtilities.js}"></script>
</th:block>

</body>
</html>
