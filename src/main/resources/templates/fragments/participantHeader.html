<!DOCTYPE html>
<html
        lang="en"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://thymeleaf.org"
>

<nav id="main-nav" layout:fragment="participant-navlist">
  <!-- Close button for mobile sidebar -->
  <button id="sidebar-close-btn" aria-label="Close menu">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-x" viewBox="0 0 16 16">
      <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"/>
    </svg>
  </button>

  <ul class="navbar-nav main-menu p-0 py-4">
    <!-- Home Link -->
    <li title="Home" class="nav-item-menu">
      <a class="nav-link-menu" th:href="@{/home}">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-house" viewBox="0 0 20 20">
          <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293zM13 7.207V13.5a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V7.207l5-5z"/>
        </svg>
        <span class="nav-link-menu-title">Home</span>
      </a>
    </li>

    <!-- Programs Link  -->
    <li title="Programs" class="nav-item-menu">
      <a href="#" class="nav-link-menu" data-navitem="Programs" onclick="expandSubmenu(event)">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-person-video3" viewBox="0 0 20 20">
          <path d="M14 9.5a2 2 0 1 1-4 0 2 2 0 0 1 4 0m-6 5.7c0 .8.8.8.8.8h6.4s.8 0 .8-.8-.8-3.2-4-3.2-4 2.4-4 3.2"/>
          <path d="M2 2a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h5.243c.122-.326.295-.668.526-1H2a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v7.81c.353.23.656.496.91.783Q16 12.312 16 12V4a2 2 0 0 0-2-2z"/>
        </svg>
        <span class="nav-link-menu-title">Programs</span>
        <svg class="nav-arrow" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" /></svg>
      </a>
      <ul id="Programs-submenu" class="nav-item-submenu">
        <li><a th:href="@{/program/accepted-rejected-programs}">Accept/Reject Program</a></li>
        <li><a th:href="@{/program/my-programs}">My Programs</a></li>
        <li><a th:href="@{/program/apply-for-programs}">Apply for Programs</a></li>
      </ul>
    </li>

    <!-- Notifications -->
        <li class="nav-item-menu">
            <a th:href="@{/notifications/mynotifications}" class="nav-link-menu" data-navitem="Notifications">
                
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-bell" viewBox="0 0 16 16">
                    <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2M8 1.918l-.797.161A4 4 0 0 0 4 6c0 .628-.134 2.197-.459 3.742-.16.767-.376 1.566-.663 2.258h10.244c-.287-.692-.502-1.49-.663-2.258C12.134 8.197 12 6.628 12 6a4 4 0 0 0-3.203-3.92L8 1.917zM14.22 12c.223.447.481.801.78 1H1c.299-.199.557-.553.78-1C2.68 10.2 3 6.88 3 6c0-2.42 1.72-4.44 4.005-4.901a1 1 0 1 1 1.99 0A5 5 0 0 1 13 6c0 .88.32 4.2 1.22 6"/>
                </svg>
                
                <span class="nav-link-menu-title">Notifications</span>
                
                <span class="badge rounded-pill bg-danger ms-auto me-2 js-unread-badge"
                      th:classappend="${#lists.size(sidebarnotifications.?[!read]) == 0 ? 'd-none' : ''}"
                      th:text="${#lists.size(sidebarnotifications.?[!read])}">
                </span>
                
                <svg class="nav-arrow" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
                </svg>
                
            </a>
        </li>

    <!-- Profile Link -->
    <li title="Profile" class="nav-item-menu">
      <a href="#" class="nav-link-menu" data-navitem="Profile" onclick="expandSubmenu(event)">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
          <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
        </svg>
        <span class="nav-link-menu-title">Profile</span>
        <svg class="nav-arrow" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" /></svg>
      </a>
      <ul id="Profile-submenu" class="nav-item-submenu">
        <li><a th:href="@{/participant/edit-profile}">View Profile</a></li>
        <li><a th:href="@{/users/change-password}">Change Password</a></li>
        <script th:inline="javascript">
          const Auth = {
              logout: [[@{/logout}]],
              redirectURL: [[@{/index}]]
          };
        </script>
        <li><a id="logout-link" href="#" onclick="logout()">Logout</a></li>
      </ul>
    </li>
  </ul>
</nav>
</html>
