<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head></head>
<body>

<div th:fragment="loginModal">

    <link th:href="@{/css/loginModal.css}" rel="stylesheet">

    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="loginModalLabel">Login</h5>
                    <button type="button" class="custom-close-btn" data-bs-dismiss="modal" aria-label="Close">×</button>
                </div>
                <div class="modal-body">
                    <form id="modalLoginForm" autocomplete="off">

                        <div class="mb-3"> <label for="modalUserId" class="form-label fw-bold">User ID:</label> <div class="input-group input-group-height-fix">
                            <span class="input-group-text"><i class="fa fa-user"></i></span>
                            <input type="text" class="form-control" id="modalUserId" placeholder="Enter User ID" required>
                        </div>
                        </div>

                        <div class="mb-3">
                            <label for="modalPassword" class="form-label fw-bold">Password:</label>
                            <div class="input-group input-group-height-fix">
                                <span class="input-group-text"><i class="fa fa-lock"></i></span>
                                <input type="password" class="form-control" id="modalPassword" placeholder="Enter Password" required>
                                <span class="input-group-text toggle-modal-password" style="cursor: pointer;">
                                    <i class="fa fa-eye"></i>
                                </span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Captcha:</label>
                            <div class="captcha-wrapper mb-2">
                                <div class="captcha-image-container">
                                    <img id="modalCaptchaImage" th:src="${'data:image/jpg;base64,' + captchaPrincipal?.realCaptcha}"
                                         title="Click To Reload New Captcha" />
                                </div>
                                <div class="captcha-refresh-container">
                                    <span id="modalRefreshCaptcha">
                                        <img th:src="@{/tempscripts/assets/images/refresh.png}" class="captcha-refresh-icon" title="Click To Reload New Captcha"
                                             onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';"/>
                                        <i class="fa fa-sync-alt" style="display:none; font-size: 20px; color: #555;"></i>
                                    </span>
                                </div>
                            </div>
                            <input type="hidden" id="modalHiddenCaptcha" th:value="${captchaPrincipal?.hiddentCaptcha}">
                            <input type="text" class="form-control form-control-lg" id="modalUserCaptcha" maxlength="6" placeholder="Enter the Captcha" required>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-login-primary w-100">LOGIN</button>
                        </div>

                        <div id="captcha-feedback" class="captcha-error-message"></div>

                        <div class="forgot-password-container mt-3">
                            <a th:href="@{/users/forget-password}" class="forgot-password-link">
                                Forgot Password?
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const API = {
            reloadCaptcha: [[@{/captcha/reload-captcha}]],
            validateCaptcha: [[@{/captcha/validate-captcha}]],
            login: [[@{/login}]],
            redirectURL: [[@{/home}]]
        };
    </script>
    <script th:src="@{/js/loginModal.js}"></script>
</div>
</body>
</html>
